            {veh?.hasTax&&calcTax().total>0&&<div style={{marginTop:8,padding:"10px 14px",background:"#FEF2F2",borderRadius:6,border:"1px solid #FECACA"}}>
              <div style={{fontSize:12,color:"#991B1B",fontWeight:700,marginBottom:6}}>{veh.taxMode==="specialOnly"?"세금 (특장 부분만 적용)":"세금"}</div>
              <div style={{display:"flex",justifyContent:"space-between",marginBottom:4}}><span style={{fontSize:13,color:"#991B1B",fontWeight:600}}>개별소비세 (3.5%)</span><span style={{fontSize:13,fontWeight:700,color:"#991B1B"}}>{fmt(calcTax().indTax)}원</span></div>
              <div style={{display:"flex",justifyContent:"space-between"}}><span style={{fontSize:13,color:"#991B1B",fontWeight:600}}>교육세 (개소세의 30%)</span><span style={{fontSize:13,fontWeight:700,color:"#991B1B"}}>{fmt(calcTax().eduTax)}원</span></div>
              <div style={{display:"flex",justifyContent:"space-between",borderTop:"1px solid #FECACA",marginTop:6,paddingTop:6}}><span style={{fontSize:14,color:"#991B1B",fontWeight:800}}>세금 합계</span><span style={{fontSize:14,fontWeight:900,color:"#991B1B"}}>{fmt(calcTax().total)}원</span></div>
            </div>}
            <div style={{background:"#1a1a1a",borderRadius:8,padding:"14px 20px",marginTop:12,display:"flex",justifyContent:"space-between",alignItems:"center"}}><div><div style={{fontSize:22.0,fontWeight:800,color:"#fff"}}>총 견적 금액</div><div style={{fontSize:14.0,color:"rgba(255,255,255,0.6)",marginTop:2}}>◆ VAT 포함</div></div><div style={{fontSize:26,fontWeight:900,color:"#fff"}}>{fmt(tot())}<span style={{fontSize:14.0,color:"rgba(255,255,255,0.6)",marginLeft:3}}>원</span></div></div>
            {barTotal>0&&<div style={{display:"flex",marginTop:6,borderRadius:3,overflow:"hidden",height:4}}>{hasV&&<div style={{flex:vS(),background:BL}} />}{hasS&&<div style={{flex:sS(),background:GD}} />}{disc>0&&<div style={{flex:disc,background:"#ef4444"}} />}</div>}
            {cNo&&<div style={{marginTop:14,padding:"8px 12px",background:"#fafafa",borderRadius:4,borderLeft:"3px solid #1a1a1a"}}><div style={{fontSize:12.0,color:GD,letterSpacing:2,marginBottom:2,fontWeight:700}}>비고</div><div style={{fontSize:14.0,color:"#555",lineHeight:1.5}}>{cNo}</div></div>}
            <div style={{marginTop:20,paddingTop:12,borderTop:"1px solid #eee",textAlign:"center"}}><div style={{fontSize:13.0,color:"#ccc"}}>본 견적서는 발행일로부터 30일간 유효합니다 · VAT 포함</div><div style={{fontSize:13.0,color:"#ccc",marginTop:2}}>{CI.name} | {CI.ceo} | {CI.phone} | {CI.address}</div></div>
          </div>
        </div>
      </div>
    </div>);
  }

  // ═══ STEP 3: ADMIN ═══
  if(step===3){
    if(!aa) return(<div style={{minHeight:"100vh",background:"#fff",display:"flex",alignItems:"center",justifyContent:"center",fontFamily:F}}><FL />
      <div style={{background:"#fff",borderRadius:16,padding:"36px 32px",boxShadow:"0 4px 24px rgba(0,0,0,0.06)",border:"1px solid #eee",width:340,textAlign:"center"}}>
        <div style={{fontSize:24,fontWeight:900,marginBottom:20}}>🔒 관리자</div>
        <input type="password" value={ap} onChange={e=>{setAP(e.target.value);setAE(false);}} onKeyDown={e=>{if(e.key==="Enter"){if(ap===D.adminPw)setAA(true);else setAE(true);}}} placeholder="비밀번호" style={{width:"100%",padding:"10px 14px",border:`2px solid ${ae?"#ef4444":"#eee"}`,borderRadius:8,fontSize:16,textAlign:"center",outline:"none",marginBottom:10}} />
        {ae&&<div style={{color:"#ef4444",fontSize:13,marginBottom:6}}>비밀번호가 틀렸습니다</div>}
        <div style={{display:"flex",gap:8}}><button onClick={()=>setStep(0)} style={{...bL,flex:1}}>← 돌아가기</button><button onClick={()=>{if(ap===D.adminPw)setAA(true);else setAE(true);}} style={{flex:1,padding:"9px",background:"#1a1a1a",color:"#fff",border:"none",borderRadius:8,fontWeight:800,cursor:"pointer"}}>로그인</button></div>
      </div>
    </div>);

    const tabs=[{k:"company",l:"회사정보"},{k:"vehicles",l:"차종/트림"},{k:"models",l:"특장모델"},{k:"pw",l:"비밀번호"}];
    const up=fn=>{const nd=JSON.parse(JSON.stringify(D));fn(nd);doSv(nd);};
    return(<div style={{minHeight:"100vh",background:"#fafafa",padding:"20px 14px",fontFamily:F}}><FL />
      <div style={{maxWidth:960,margin:"0 auto"}}>
        <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",marginBottom:16}}>
          <button onClick={()=>{setAA(false);setStep(0);}} style={bL}>← 견적으로</button>
          <div style={{fontSize:18,fontWeight:900}}>⚙️ 관리자</div>
          {sMsg&&<div style={{fontSize:13,fontWeight:700,color:sMsg.includes("✅")?"#16a34a":"#ef4444"}}>{sMsg}</div>}
        </div>
        <div style={{display:"flex",gap:4,marginBottom:14,flexWrap:"wrap"}}>{tabs.map(t=><button key={t.k} onClick={()=>setATab(t.k)} style={{padding:"7px 14px",borderRadius:6,border:"1px solid #eee",cursor:"pointer",fontSize:13,fontWeight:700,background:aTab===t.k?"#1a1a1a":"#fff",color:aTab===t.k?"#fff":"#666"}}>{t.l}</button>)}</div>
        <div style={{background:"#fff",border:"1px solid #eee",borderRadius:12,padding:"20px",minHeight:360}}>
          {aTab==="company"&&<div>
            <h3 style={{fontSize:15,fontWeight:800,color:GD,marginBottom:14}}>회사 정보</h3>
            {["name","ceo","bizNo","bizType","bizItem","phone","address"].map(k=>(<div key={k} style={{display:"flex",alignItems:"center",gap:8,marginBottom:6}}><span style={{width:70,fontSize:12,color:"#999",fontWeight:600,textAlign:"right"}}>{({name:"상호",ceo:"대표",bizNo:"등록번호",bizType:"업태",bizItem:"종목",phone:"전화",address:"주소"})[k]}</span><input value={D.company[k]} onChange={e=>up(d=>{d.company[k]=e.target.value;})} style={{flex:1,...iS}} /></div>))}
          </div>}
          {aTab==="vehicles"&&<div>{D.vehicles.map((v,vi)=>(<div key={v.id} style={{marginBottom:24,borderBottom:"1px solid #f0f0f0",paddingBottom:14}}>
            <div style={{display:"flex",alignItems:"center",gap:8,marginBottom:10}}><div style={{background:v.id==="carnival"?"#1a1a1a":v.id==="challenger"?"#DC2626":"#0369A1",color:"#fff",padding:"2px 10px",borderRadius:12,fontSize:11,fontWeight:800}}>{v.badge}</div><input value={v.name} onChange={e=>up(d=>{d.vehicles[vi].name=e.target.value;})} style={{fontSize:15,fontWeight:800,...iS,border:"none",padding:"3px 6px"}} /></div>
            <div style={{fontSize:13,fontWeight:700,color:GD,marginBottom:6}}>트림</div>
            {v.trims.map((t,ti)=>(<div key={t.id} style={{display:"flex",alignItems:"center",gap:6,marginBottom:4,marginLeft:8}}><input value={t.name} onChange={e=>up(d=>{d.vehicles[vi].trims[ti].name=e.target.value;})} style={{width:160,...iS,fontSize:13}} /><input type="number" value={t.price} onChange={e=>up(d=>{d.vehicles[vi].trims[ti].price=Number(e.target.value)||0;})} style={{width:120,...iS,textAlign:"right",fontSize:13}} /><span style={{fontSize:12,color:"#bbb"}}>원</span><button onClick={()=>up(d=>{d.vehicles[vi].trims.splice(ti,1);})} style={dB}>✕</button></div>))}
            <button onClick={()=>up(d=>{d.vehicles[vi].trims.push({id:uid(),name:"새 트림",price:0});})} style={{...aB,marginLeft:8,fontSize:12}}>+ 트림</button>
          </div>))}</div>}
          {aTab==="models"&&<div>{D.vehicles.map((v,vi)=>(<div key={v.id} style={{marginBottom:20}}>
            <div style={{fontSize:15,fontWeight:800,marginBottom:8}}>{v.badge} - {v.name}</div>
            {v.models.map((m,mi)=>(<div key={m.id} style={{marginBottom:16,paddingBottom:10,borderBottom:"1px solid #f5f5f5"}}>
              <div style={{display:"flex",alignItems:"center",gap:6,marginBottom:6}}><div style={{width:4,height:12,borderRadius:2,background:m.color}} /><input value={m.name} onChange={e=>up(d=>{d.vehicles[vi].models[mi].name=e.target.value;})} style={{fontSize:14,fontWeight:800,...iS,border:"none",padding:"2px 6px"}} /><input value={m.subtitle} onChange={e=>up(d=>{d.vehicles[vi].models[mi].subtitle=e.target.value;})} style={{fontSize:12,...iS,width:80,border:"none",padding:"2px 6px",color:"#999"}} /><input type="color" value={m.color} onChange={e=>up(d=>{d.vehicles[vi].models[mi].color=e.target.value;})} style={{width:22,height:22,border:"none",cursor:"pointer"}} /><button onClick={()=>up(d=>{d.vehicles[vi].models.splice(mi,1);})} style={{...dB,marginLeft:"auto"}}>삭제</button></div>
              {m.options.map((o,oi)=>(<div key={o.id} style={{display:"flex",alignItems:"center",gap:4,marginBottom:3,marginLeft:12}}><input value={o.name} onChange={e=>up(d=>{d.vehicles[vi].models[mi].options[oi].name=e.target.value;})} style={{flex:1,...iS,fontSize:12}} /><input type="number" value={o.price} onChange={e=>up(d=>{d.vehicles[vi].models[mi].options[oi].price=Number(e.target.value)||0;})} style={{width:100,...iS,textAlign:"right",fontSize:12}} /><button onClick={()=>up(d=>{d.vehicles[vi].models[mi].options.splice(oi,1);})} style={dB}>✕</button></div>))}
              <button onClick={()=>up(d=>{d.vehicles[vi].models[mi].options.push({id:uid(),name:"새 옵션",desc:"",price:0});})} style={{...aB,marginLeft:12,fontSize:11}}>+ 옵션</button>
            </div>))}
            <button onClick={()=>up(d=>{d.vehicles[vi].models.push({id:uid(),name:"새 모델",subtitle:"",color:"#666",options:[]});})} style={{...aB,background:"#1a1a1a",color:"#fff"}}>+ 새 모델</button>
          </div>))}</div>}
          {aTab==="pw"&&<div>
            <h3 style={{fontSize:15,fontWeight:800,color:GD,marginBottom:14}}>비밀번호 변경</h3>
            <div style={{display:"flex",alignItems:"center",gap:8}}><span style={{fontSize:13,color:"#999"}}>비밀번호</span><input type="text" value={D.adminPw} onChange={e=>up(d=>{d.adminPw=e.target.value;})} style={{width:180,...iS}} /></div>
            <div style={{marginTop:20,padding:"12px 16px",background:"#FFF5F5",borderRadius:6,border:"1px solid #fee"}}><div style={{fontSize:13,fontWeight:700,color:"#c00",marginBottom:4}}>⚠️ 초기화</div><button onClick={()=>{if(window.confirm("모든 데이터를 초기화?")){doSv(DD);}}} style={{padding:"6px 14px",background:"#ef4444",color:"#fff",border:"none",borderRadius:5,fontSize:12,fontWeight:700,cursor:"pointer"}}>초기화</button></div>
          </div>}
        </div>
      </div>
    </div>);
  }
  return null;
}

function MC({m,onClick}){const[h,setH]=useState(false);return(<div onClick={onClick} onMouseEnter={()=>setH(true)} onMouseLeave={()=>setH(false)} style={{width:170,background:"#fff",border:`1px solid ${h?"#ccc":"#eee"}`,borderRadius:12,padding:"22px 18px",cursor:"pointer",transition:"all 0.2s",transform:h?"translateY(-2px)":"none",boxShadow:h?"0 8px 20px rgba(0,0,0,0.06)":"0 1px 3px rgba(0,0,0,0.02)",position:"relative",overflow:"hidden"}}><div style={{position:"absolute",top:0,left:0,right:0,height:3,background:`linear-gradient(90deg,${m.color},${m.color}88)`}} /><div style={{fontSize:10,color:GD,letterSpacing:3,marginBottom:6,fontWeight:700}}>{m.subtitle}</div><div style={{fontSize:18,fontWeight:900,color:"#1a1a1a",marginBottom:4,whiteSpace:"pre-line",lineHeight:1.3}}>{m.name}</div><div style={{fontSize:12,color:"#bbb",marginBottom:14}}>옵션 {m.options.length}종</div><div style={{color:GD,fontSize:12,fontWeight:700}}>견적 시작 →</div></div>);}
function GL({t,c}){const bg=c===BL?"linear-gradient(90deg,#EBF2FF,#E0EDFF)":"linear-gradient(90deg,#FFF5E6,#FFEDCC)";return(<div style={{display:"flex",alignItems:"center",gap:8,padding:"10px 14px",borderRadius:8,background:bg,marginTop:4}}><div style={{width:5,height:18,borderRadius:3,background:c}} /><div style={{fontSize:16,fontWeight:900,color:c===BL?"#1E40AF":"#92400E"}}>{t}</div></div>);}
function Sc({t,ic,ac,bg,children}){return(<div style={{background:bg||"#fff",border:"1px solid "+(bg?"transparent":"#eee"),borderRadius:10,padding:"14px 16px"}}><div style={{display:"flex",alignItems:"center",gap:6,marginBottom:10}}>{ac&&<div style={{width:3,height:12,borderRadius:2,background:ac}} />}{ic&&<span style={{fontSize:14}}>{ic}</span>}<div style={{fontSize:13.5,fontWeight:800,color:ac||GD}}>{t}</div></div>{children}</div>);}
function In({l,v,s,ph,mt}){return(<div style={{marginTop:mt||0}}><div style={{fontSize:11,color:"#bbb",marginBottom:3,fontWeight:600}}>{l}</div><input type="text" value={v} onChange={e=>s(e.target.value)} placeholder={ph} style={{width:"100%",...iS}} /></div>);}
function TC({t,sel,oc}){return(<div onClick={oc} style={{padding:"10px 12px",borderRadius:7,cursor:"pointer",border:sel?"2px solid #1a1a1a":"1px solid #ddd",background:sel?"#fafafa":"#fff"}}><div style={{fontSize:13.5,fontWeight:700,color:sel?"#1a1a1a":"#555"}}>{t.name}</div><div style={{fontSize:15,fontWeight:800,color:sel?"#1a1a1a":"#888",marginTop:2}}>{fmt(t.price)}원</div></div>);}
function OR({it,ck,tg,lk,sd}){const neg=it.price<0;return(<div onClick={lk?undefined:tg} style={{display:"flex",alignItems:"center",gap:8,padding:"7px 8px",borderRadius:6,cursor:lk?"default":"pointer",background:ck?(neg?"#FEF2F2":"#fafafa"):"transparent",marginBottom:2}}><div style={{width:15,height:15,borderRadius:3,flexShrink:0,border:ck?(neg?"2px solid #ef4444":"2px solid #1a1a1a"):"2px solid #aaa",background:ck?(neg?"#ef4444":"#1a1a1a"):"transparent",display:"flex",alignItems:"center",justifyContent:"center",fontSize:11,color:"#fff",fontWeight:900}}>{ck&&"✓"}</div><div style={{flex:1,minWidth:0}}><div style={{fontSize:13,fontWeight:600,color:ck?(neg?"#ef4444":"#1a1a1a"):"#555"}}>{it.name}</div>{sd&&it.desc&&<div style={{fontSize:11.5,color:"#888",marginTop:1,lineHeight:1.3}}>{it.desc}</div>}</div><div style={{textAlign:"right",flexShrink:0}}>{it.originalPrice>0&&<div style={{fontSize:11,color:"#999",textDecoration:"line-through"}}>{fmt(it.originalPrice)}</div>}<div style={{fontSize:13.5,fontWeight:700,color:neg?(ck?"#ef4444":"#e88"):(ck?"#1a1a1a":"#888")}}>{fmt(it.price)}원</div></div></div>);}
function SL({l,v,d}){return(<div style={{display:"flex",justifyContent:"space-between",padding:"4px 0",fontSize:16}}><span style={{color:"#666"}}>{l}</span><span style={{color:d?"#ef4444":"#333",fontWeight:600}}>{d&&"-"}{fmt(Math.abs(v))}원</span></div>);}
function PH({t,c,mt}){return(<div style={{display:"flex",alignItems:"center",gap:6,padding:"6px 0 4px",marginTop:mt||0}}><div style={{width:4,height:12,borderRadius:2,background:c}} /><div style={{fontSize:15,fontWeight:900,color:"#333"}}>{t}</div><div style={{flex:1,height:1,background:"#eee"}} /></div>);}
function IB({l,a,b,c}){return(<div style={{background:"#fafafa",borderRadius:4,padding:"9px 12px",border:"1px solid #f0f0f0"}}><div style={{fontSize:12,color:GD,letterSpacing:2,marginBottom:4,fontWeight:700}}>{l}</div><div style={{fontSize:16,fontWeight:700,color:"#1a1a1a"}}>{a}</div><div style={{fontSize:14,color:"#999",marginTop:1}}>{b}</div>{c&&<div style={{fontSize:13,color:"#888",marginTop:2}}>{c}</div>}</div>);}
function Th({children,w,a="center"}){return<th style={{padding:"6px 10px",textAlign:a,fontSize:13.5,fontWeight:700,color:"#777",width:w}}>{children}</th>;}
function Td({children,a="left",b,c,s,m}){return<td style={{padding:"6px 10px",textAlign:a,fontSize:s||10.5,fontWeight:b?700:400,color:c||"#333",fontVariantNumeric:m?"tabular-nums":undefined}}>{children}</td>;}
const bL={background:"#fff",border:"1px solid #eee",color:"#888",padding:"7px 12px",borderRadius:6,cursor:"pointer",fontSize:13,fontWeight:600};
const iS={background:"#fafafa",border:"1px solid #eee",borderRadius:5,color:"#222",padding:"6px 9px",fontSize:13,outline:"none"};
const dB={background:"none",border:"1px solid #fcc",color:"#c00",borderRadius:3,padding:"1px 5px",fontSize:11,cursor:"pointer"};
const aB={background:"#fafafa",border:"1px solid #eee",borderRadius:5,padding:"5px 12px",fontSize:12,fontWeight:700,color:"#999",cursor:"pointer",marginTop:6};
const thC={padding:"4px 8px",background:"#f7f7f7",fontWeight:600,color:"#888",borderRight:"1px solid #ccc",borderBottom:"1px solid #eee",width:"13%"};
const tdC={padding:"4px 8px",borderBottom:"1px solid #eee",color:"#222",fontWeight:600};

const root = ReactDOM.createRoot(document.getElementById('root'));
root.render(React.createElement(App));
</script>
</body>
</html>
