        <table style={tb}><tbody><tr><td style={{...ch,width:"13%"}}>차 종</td><td colSpan={3} style={{...cs,fontSize:13,fontWeight:700}}>{carName}</td><td style={{...ch,width:"8%"}}>대수</td><td style={{...cs,width:"8%",textAlign:"center"}}>1</td></tr><tr><td style={ch}>선택사양</td><td colSpan={5} style={{...cs,fontSize:11,lineHeight:1.5}}>{vehOpts.join(" / ")||"없음"}</td></tr><tr><td style={ch}>인도장소</td><td colSpan={2} style={cs}>본사 차고</td><td style={{...ch,width:"10%"}}>인도기한</td><td colSpan={2} style={cs}></td></tr></tbody></table>
        <div style={{fontSize:10,color:"#999",marginBottom:10}}>※ 다음 계약내용 및 계약조항의 주요내용에 대한 설명을 듣고 계약서 1통을 정히 수령하였음을 확인함.</div>
        <table style={{...tb,marginBottom:10}}><colgroup><col style={{width:"12%"}} /><col style={{width:"22%"}} /><col style={{width:"2%"}} /><col style={{width:"11%"}} /><col style={{width:"20%"}} /><col style={{width:"22%"}} /></colgroup><tbody>
          <tr><td colSpan={2} style={{padding:"0 0 4px",fontSize:14,fontWeight:900,border:"none"}}>■ 가격사항</td><td style={{border:"none"}}></td><td colSpan={3} style={{padding:"0 0 4px",fontSize:14,fontWeight:900,border:"none"}}>■ 지불조건</td></tr>
          <tr><td style={ch}>차량가격</td><td style={amtCell}>{fmtW(vS())}</td><td style={{border:"none"}}></td><td style={ch}>계약금</td><td style={dateCell}><input type="text" value={ctDepDate} onChange={e=>setCtDepDate(e.target.value)} placeholder="년 월 일" style={{...ctIn,textAlign:"center"}} /></td><td style={amtCell}><input type="number" value={ctDeposit||""} onChange={e=>setCtDeposit(Number(e.target.value)||0)} placeholder="금액" style={{...ctIn,textAlign:"right",fontWeight:600,width:"70%",display:"inline"}} /> 원정</td></tr>
          <tr><td style={ch}>옵션가격</td><td style={amtCell}>{fmtW(sS())}</td><td style={{border:"none"}}></td><td style={ch}>중도금</td><td style={dateCell}><input type="text" value={ctMidDate} onChange={e=>setCtMidDate(e.target.value)} placeholder="년 월 일" style={{...ctIn,textAlign:"center"}} /></td><td style={amtCell}><input type="number" value={ctMid||""} onChange={e=>setCtMid(Number(e.target.value)||0)} placeholder="금액" style={{...ctIn,textAlign:"right",fontWeight:600,width:"70%",display:"inline"}} /> 원정</td></tr>
          <tr><td style={ch}>할인금액</td><td style={{...amtCell,color:disc>0?"#c00":"#333"}}>{disc>0?"-"+fmtW(disc):"원정"}</td><td style={{border:"none"}}></td><td style={ch}>인도금</td><td style={dateCell}><input type="text" value={ctFinDate} onChange={e=>setCtFinDate(e.target.value)} placeholder="년 월 일" style={{...ctIn,textAlign:"center"}} /></td><td style={amtCell}><input type="number" value={ctFinal||""} onChange={e=>setCtFinal(Number(e.target.value)||0)} placeholder="금액" style={{...ctIn,textAlign:"right",fontWeight:600,width:"70%",display:"inline"}} /> 원정</td></tr>
          <tr><td style={{...ch,fontSize:13}}>합 계</td><td style={{...amtCell,fontSize:14,fontWeight:900}}>{fmtW(tot())}</td><td colSpan={4} style={{border:"none"}}></td></tr>
        </tbody></table>
        <div style={{fontSize:14,fontWeight:900,marginBottom:4}}>■ 특약사항</div>
        <div style={{border:"1px solid #555",padding:"8px 10px",marginBottom:6,minHeight:50}}>
          <div style={{fontSize:13,fontWeight:800,color:"#c00",marginBottom:4}}>{ctNote}</div>
          {spOpts.length>0&&<div style={{fontSize:11,lineHeight:1.7,marginBottom:6}}><span style={{fontWeight:800,fontSize:12}}>[ 특장 옵션 ]</span><br/>{spOpts.map((o,i)=><span key={i} style={{display:"inline-block",background:"#f5f5f5",border:"1px solid #ddd",borderRadius:3,padding:"1px 6px",margin:"1px 2px",fontSize:11,fontWeight:600}}>{i+1}. {o}</span>)}</div>}
          <textarea value={ctCustomNote} onChange={e=>setCtCustomNote(e.target.value)} placeholder="추가 특약사항 입력..." rows={2} style={{width:"100%",border:"1px dashed #ccc",borderRadius:4,padding:"6px 8px",fontSize:12,outline:"none",resize:"vertical",background:"#fafafa",color:"#333"}} />
        </div>
        <div style={{textAlign:"right",fontSize:13,marginBottom:12}}>고객서명 <span style={{display:"inline-block",width:130,borderBottom:"1px solid #333"}}></span> (인)</div>
        <div style={{fontSize:14,fontWeight:900,marginBottom:4,borderTop:"2px solid #333",paddingTop:8}}>■ 영수증</div>
        <div style={{border:"1px solid #555",padding:"8px 12px",marginBottom:4}}><div style={{fontSize:12}}>위 계약금 <span style={{display:"inline-block",width:100,borderBottom:"1px solid #999",textAlign:"center",fontWeight:700,fontVariantNumeric:"tabular-nums"}}>{ctDeposit>0?fmt(ctDeposit):""}</span> 원을 정히 영수함.</div><div style={{fontSize:12,marginTop:4}}><span style={{display:"inline-block",width:160,borderBottom:"1px solid #999"}}></span> 년 월 일</div><div style={{fontSize:10,color:"#999",marginTop:4}}>※본인은 매매대금을 송금할 계좌번호와 송금 및 환불내역에 대한 정보를 아래 기재한 휴대전화 문자메시지로 통지받는 내용을 이해하고 이에 동의합니다.</div></div>
        <div style={{display:"flex",justifyContent:"space-between",fontSize:12,marginBottom:4}}><div>영수인 <span style={{fontWeight:700}}>{SELLER}</span> (인)</div><div>동의인(매수인) <span style={{display:"inline-block",width:100,borderBottom:"1px solid #999"}}></span> (인)</div></div>
        <div style={{fontSize:10,color:"#999",marginBottom:8}}>※ 상기 영수증은 자동차 매매대금으로만 효력이 있으며 기타 용도로 사용은 무효입니다.</div>
        <div style={{fontSize:14,fontWeight:900,marginBottom:4}}>■ 고객사항</div>
        <table style={tb}><tbody>
          <tr><td rowSpan={4} style={{...ch,width:"5%",textAlign:"center",verticalAlign:"middle",fontSize:13,letterSpacing:3}}>고<br/>객<br/>(1)</td><td style={{...ch,width:"16%"}}>성명(상호)★</td><td style={cs}><input type="text" value={ctName} onChange={e=>setCtName(e.target.value)} style={ctIn} /></td><td style={{...cs,width:"4%"}}>(인)</td><td style={{...ch,width:"14%"}}>대리인★</td><td style={cs}></td><td style={{...ch,width:"8%"}}>관계:</td></tr>
          <tr><td style={ch}>주민등록번호★</td><td colSpan={5} style={cs}><input type="text" value={ctSsn} onChange={e=>setCtSsn(e.target.value)} placeholder="주민등록번호" style={ctIn} /></td></tr>
          <tr><td style={ch}>주소★</td><td colSpan={5} style={cs}><input type="text" value={ctAddr} onChange={e=>setCtAddr(e.target.value)} style={ctIn} /></td></tr>
          <tr><td style={ch}>전화번호</td><td style={cs}><input type="text" value={ctPhone} onChange={e=>phoneFormat(e.target.value,setCtPhone)} placeholder="H/P" style={ctIn} /></td><td colSpan={2} style={cs}><input type="text" value={ctHomePhone} onChange={e=>setCtHomePhone(e.target.value)} placeholder="자택" style={ctIn} /></td><td style={ch}>E-mail</td><td style={cs}><input type="text" value={ctEmail} onChange={e=>setCtEmail(e.target.value)} style={ctIn} /></td></tr>
          <tr><td rowSpan={4} style={{...ch,width:"5%",textAlign:"center",verticalAlign:"middle",fontSize:13,letterSpacing:3}}>고<br/>객<br/>(2)</td><td style={{...ch}}>성명(상호)★</td><td style={cs}><input type="text" value={ctName2} onChange={e=>setCtName2(e.target.value)} style={ctIn} /></td><td style={{...cs,width:"4%"}}>(인)</td><td style={{...ch}}>대리인★</td><td style={cs}></td><td style={{...ch}}>관계:</td></tr>
          <tr><td style={ch}>주민등록번호★</td><td colSpan={5} style={cs}><input type="text" value={ctSsn2} onChange={e=>setCtSsn2(e.target.value)} placeholder="주민등록번호" style={ctIn} /></td></tr>
          <tr><td style={ch}>주소★</td><td colSpan={5} style={cs}><input type="text" value={ctAddr2} onChange={e=>setCtAddr2(e.target.value)} style={ctIn} /></td></tr>
          <tr><td style={ch}>전화번호</td><td style={cs}><input type="text" value={ctPhone2} onChange={e=>phoneFormat(e.target.value,setCtPhone2)} placeholder="H/P" style={ctIn} /></td><td colSpan={2} style={cs}><input type="text" value={ctHomePhone2} onChange={e=>setCtHomePhone2(e.target.value)} placeholder="자택" style={ctIn} /></td><td style={ch}>E-mail</td><td style={cs}><input type="text" value={ctEmail2} onChange={e=>setCtEmail2(e.target.value)} style={ctIn} /></td></tr>
        </tbody></table>
        <div style={{marginTop:8,fontSize:14,fontWeight:900,marginBottom:4}}>■ 매도인</div>
        <div style={{border:"1px solid #555",padding:"8px 12px"}}><div style={{textAlign:"right",fontSize:12,marginBottom:6}}>(인) 고객의 성명, 주소, 개인정보는 고객 자필(날인)임을 확인함.</div><div style={{display:"flex",justifyContent:"space-between",fontSize:13,marginBottom:6}}><div>판매자 <span style={{fontWeight:700}}>{SELLER}</span></div><div>판매자 성명 : <span style={{fontWeight:700}}>{SELLER}</span> (인)</div></div><div style={{fontSize:11,color:"#888"}}>※ (★ 칸)은 고객 필수 자필 기재사항입니다.</div><div style={{fontSize:13,fontWeight:700,marginTop:4}}>입금계좌 <span style={{color:"#1E40AF"}}>{BANK}</span></div></div>
      </div></div></div></div>);
  }


  if(step===7){
    var openPL=function(m){
      try{var h=m==="cargo"?window.PL_CARGO:window.PL_PASS;
      var w=window.open("","_blank");
      if(w){w.document.write(h);w.document.close();}else showToast("팝업을 허용해주세요");
      }catch(e){showToast("오류: "+e.message);}};
    var cS={width:280,background:"#fff",border:"2px solid #1b2f4e",borderRadius:16,padding:"32px 24px",cursor:"pointer",textAlign:"center",boxShadow:"0 2px 12px rgba(27,47,78,0.08)",transition:"all 0.2s"};
    var bS={background:"#1b2f4e",color:"#fff",padding:"10px 0",borderRadius:8,fontSize:14,fontWeight:800,marginTop:16};
    var oe=function(e){e.currentTarget.style.transform="translateY(-3px)";e.currentTarget.style.boxShadow="0 8px 24px rgba(27,47,78,0.18)";};
    var ol=function(e){e.currentTarget.style.transform="none";e.currentTarget.style.boxShadow="0 2px 12px rgba(27,47,78,0.08)";};
    return(<div style={{minHeight:"100vh",background:"#f0f4f8",fontFamily:F,padding:"40px 20px"}}>{toastEl}<FL />
      <div style={{maxWidth:700,margin:"0 auto"}}>
        <div style={{marginBottom:24}}><button onClick={()=>setStep(0)} style={bL}>← 메인으로</button></div>
        <div style={{textAlign:"center",marginBottom:32}}>
          <div style={{fontSize:12,letterSpacing:6,color:"#999",fontWeight:600,marginBottom:6}}>PRICE LIST</div>
          <div style={{fontSize:26,fontWeight:900,color:"#1b2f4e"}}>가격표 출력 / 편집</div>
          <div style={{fontSize:13,color:"#99aaaa",marginTop:6}}>모델 선택 → 새 창에서 편집·행추가·인쇄</div>
        </div>
        <div style={{display:"flex",gap:20,justifyContent:"center",flexWrap:"wrap"}}>
          <div onClick={()=>openPL("cargo")} style={cS} onMouseEnter={oe} onMouseLeave={ol}>
            <div style={{fontSize:36,marginBottom:12}}>📦</div>
            <div style={{fontSize:20,fontWeight:900,color:"#1b2f4e",marginBottom:6}}>PV5 카고</div>
            <div style={{fontSize:13,color:"#778899",lineHeight:1.7}}>카고 베이직 스탠다드<br/>카고 롱레인지</div>
            <div style={bS}>편집 · 인쇄 열기 →</div>
          </div>
          <div onClick={()=>openPL("passenger")} style={cS} onMouseEnter={oe} onMouseLeave={ol}>
            <div style={{fontSize:36,marginBottom:12}}>🚌</div>
            <div style={{fontSize:20,fontWeight:900,color:"#1b2f4e",marginBottom:6}}>PV5 패신저</div>
            <div style={{fontSize:13,color:"#778899",lineHeight:1.7}}>패신저 베이직<br/>패신저 플러스</div>
            <div style={bS}>편집 · 인쇄 열기 →</div>
          </div>
        </div>
        <div style={{marginTop:24,padding:"14px 18px",background:"#e8f4ff",borderRadius:8,border:"1px solid #bae6fd",fontSize:12,color:"#0369A1",lineHeight:1.8}}>
          💡 카드 클릭 → 새 창 → 텍스트 수정 / <strong>＋ 행 추가</strong> / <strong>↩ 되돌리기</strong> → 🖨️ 인쇄
        </div>
      </div>
    </div>);
  }

  return null;
}

function MC({m,onClick}){const[h,setH]=useState(false);return(<div onClick={onClick} onMouseEnter={()=>setH(true)} onMouseLeave={()=>setH(false)} style={{width:170,background:"#fff",border:`1px solid ${h?"#ccc":"#eee"}`,borderRadius:12,padding:"22px 18px",cursor:"pointer",transition:"all 0.2s",transform:h?"translateY(-2px)":"none",boxShadow:h?"0 8px 20px rgba(0,0,0,0.06)":"0 1px 3px rgba(0,0,0,0.02)",position:"relative",overflow:"hidden"}}><div style={{position:"absolute",top:0,left:0,right:0,height:3,background:`linear-gradient(90deg,${m.color},${m.color}88)`}} /><div style={{fontSize:10,color:GD,letterSpacing:3,marginBottom:6,fontWeight:700}}>{m.subtitle}</div><div style={{fontSize:18,fontWeight:900,color:"#1a1a1a",marginBottom:4,whiteSpace:"pre-line",lineHeight:1.3}}>{m.name}</div><div style={{fontSize:12,color:"#bbb",marginBottom:14}}>옵션 {m.options.length}종</div><div style={{color:GD,fontSize:12,fontWeight:700}}>견적 시작 →</div></div>);}
function GL({t,c}){const bg=c===BL?"linear-gradient(90deg,#EBF2FF,#E0EDFF)":"linear-gradient(90deg,#FFF5E6,#FFEDCC)";return(<div style={{display:"flex",alignItems:"center",gap:8,padding:"10px 14px",borderRadius:8,background:bg,marginTop:4}}><div style={{width:5,height:18,borderRadius:3,background:c}} /><div style={{fontSize:16,fontWeight:900,color:c===BL?"#1E40AF":"#92400E"}}>{t}</div></div>);}
function Sc({t,ic,ac,bg,children}){return(<div style={{background:bg||"#fff",border:"1px solid "+(bg?"transparent":"#eee"),borderRadius:10,padding:"14px 16px"}}><div style={{display:"flex",alignItems:"center",gap:6,marginBottom:10}}>{ac&&<div style={{width:3,height:12,borderRadius:2,background:ac}} />}{ic&&<span style={{fontSize:14}}>{ic}</span>}<div style={{fontSize:13.5,fontWeight:800,color:ac||GD}}>{t}</div></div>{children}</div>);}
function In({l,v,s,ph,mt}){return(<div style={{marginTop:mt||0}}><div style={{fontSize:11,color:"#bbb",marginBottom:3,fontWeight:600}}>{l}</div><input type="text" value={v} onChange={e=>s(e.target.value)} placeholder={ph} style={{width:"100%",...iS}} /></div>);}
function TC({t,sel,oc}){return(<div onClick={oc} style={{padding:"10px 12px",borderRadius:7,cursor:"pointer",border:sel?"2px solid #1a1a1a":"1px solid #ddd",background:sel?"#fafafa":"#fff"}}><div style={{fontSize:13.5,fontWeight:700,color:sel?"#1a1a1a":"#555"}}>{t.name}</div><div style={{fontSize:15,fontWeight:800,color:sel?"#1a1a1a":"#888",marginTop:2}}>{fmt(t.price)}원</div></div>);}
function OR({it,ck,tg,lk,sd}){const neg=it.price<0;return(<div onClick={lk?undefined:tg} style={{display:"flex",alignItems:"center",gap:8,padding:"7px 8px",borderRadius:6,cursor:lk?"default":"pointer",background:ck?(neg?"#FEF2F2":"#fafafa"):"transparent",marginBottom:2}}><div style={{width:15,height:15,borderRadius:3,flexShrink:0,border:ck?(neg?"2px solid #ef4444":"2px solid #1a1a1a"):"2px solid #aaa",background:ck?(neg?"#ef4444":"#1a1a1a"):"transparent",display:"flex",alignItems:"center",justifyContent:"center",fontSize:11,color:"#fff",fontWeight:900}}>{ck&&"✓"}</div><div style={{flex:1,minWidth:0}}><div style={{fontSize:13,fontWeight:600,color:ck?(neg?"#ef4444":"#1a1a1a"):"#555"}}>{it.name}</div>{sd&&it.desc&&<div style={{fontSize:11.5,color:"#888",marginTop:1,lineHeight:1.3}}>{it.desc}</div>}</div><div style={{textAlign:"right",flexShrink:0}}>{it.originalPrice>0&&<div style={{fontSize:11,color:"#999",textDecoration:"line-through"}}>{fmt(it.originalPrice)}</div>}<div style={{fontSize:13.5,fontWeight:700,color:neg?(ck?"#ef4444":"#e88"):(ck?"#1a1a1a":"#888")}}>{fmt(it.price)}원</div></div></div>);}
function SL({l,v,d}){return(<div style={{display:"flex",justifyContent:"space-between",padding:"4px 0",fontSize:16}}><span style={{color:"#666"}}>{l}</span><span style={{color:d?"#ef4444":"#333",fontWeight:600}}>{d&&"-"}{fmt(Math.abs(v))}원</span></div>);}
function PH({t,c,mt}){return(<div style={{display:"flex",alignItems:"center",gap:6,padding:"6px 0 4px",marginTop:mt||0}}><div style={{width:4,height:12,borderRadius:2,background:c}} /><div style={{fontSize:15,fontWeight:900,color:"#333"}}>{t}</div><div style={{flex:1,height:1,background:"#eee"}} /></div>);}
function IB({l,a,b,c}){return(<div style={{background:"#fafafa",borderRadius:4,padding:"9px 12px",border:"1px solid #f0f0f0"}}><div style={{fontSize:12,color:GD,letterSpacing:2,marginBottom:4,fontWeight:700}}>{l}</div><div style={{fontSize:16,fontWeight:700,color:"#1a1a1a"}}>{a}</div><div style={{fontSize:14,color:"#999",marginTop:1}}>{b}</div>{c&&<div style={{fontSize:13,color:"#888",marginTop:2}}>{c}</div>}</div>);}
function Th({children,w,a="center"}){return<th style={{padding:"6px 10px",textAlign:a,fontSize:15.5,fontWeight:700,color:"#777",width:w}}>{children}</th>;}
function Td({children,a="left",b,c,s,m}){return<td style={{padding:"6px 10px",textAlign:a,fontSize:s?s+2:12.5,fontWeight:b?700:400,color:c||"#333",fontVariantNumeric:m?"tabular-nums":undefined}}>{children}</td>;}
const bL={background:"#fff",border:"1px solid #eee",color:"#888",padding:"7px 12px",borderRadius:6,cursor:"pointer",fontSize:13,fontWeight:600};
const iS={background:"#fafafa",border:"1px solid #eee",borderRadius:5,color:"#222",padding:"6px 9px",fontSize:13,outline:"none"};
const dB={background:"none",border:"1px solid #fcc",color:"#c00",borderRadius:3,padding:"1px 5px",fontSize:11,cursor:"pointer"};
const aB={background:"#fafafa",border:"1px solid #eee",borderRadius:5,padding:"5px 12px",fontSize:12,fontWeight:700,color:"#999",cursor:"pointer",marginTop:6};
const thC={padding:"4px 8px",background:"#f7f7f7",fontWeight:600,color:"#888",borderRight:"1px solid #ccc",borderBottom:"1px solid #eee",width:"13%"};
const tdC={padding:"4px 8px",borderBottom:"1px solid #eee",color:"#222",fontWeight:600};

const root = ReactDOM.createRoot(document.getElementById('root'));
root.render(React.createElement(App));
</script>
<script>if('serviceWorker' in navigator){navigator.serviceWorker.register('./sw.js');}</script>
</body>
</html>
