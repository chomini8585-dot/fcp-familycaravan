async function ld(){try{const r=localStorage.getItem("qa-data3");return r?JSON.parse(r):null;}catch(e){return null;}}
async function sv(d){try{localStorage.setItem("qa-data3",JSON.stringify(d));return true;}catch(e){return false;}}

function App(){
  const[D,setD]=useState(DD);const[loaded,setLoaded]=useState(false);const[step,setStep]=useState(0);
  const[aa,setAA]=useState(false);const[ap,setAP]=useState("");const[ae,setAE]=useState(false);const[aTab,setATab]=useState("company");
  const[sV,setSV]=useState(null);const[sM,setSM]=useState(null);const[sT,setST]=useState(null);
  const[trimTab,setTrimTab]=useState("all");
  const[sBO,setSBO]=useState([]);const[sTO,setSTO]=useState([]);const[sSO,setSSO]=useState([]);const[sMO,setSMO]=useState([]);
  const[selColor,setSelColor]=useState(null);
  const[selIntColor,setSelIntColor]=useState(null);
  const[cust,setCust]=useState([{n:"",p:0,on:false},{n:"",p:0,on:false},{n:"",p:0,on:false},{n:"",p:0,on:false}]);
  const[cN,setCN]=useState("");const[cP,setCP]=useState("");const[cAddr,setCAddr]=useState("");const[cNo,setCNo]=useState("");const[disc,setDisc]=useState(0);
  const[sMsg,setSMsg]=useState("");const[toast,setToast]=useState("");const pr=useRef(null);
  const showToast=(msg)=>{setToast(msg);setTimeout(()=>setToast(""),2500);};

  // URL에서 견적 복원
  useEffect(()=>{
    ld().then(d=>{
      if(d)setD(d);
      setLoaded(true);
      try{
        const p=new URLSearchParams(window.location.search);
        if(p.get("v")&&p.get("m")){
          setSV(p.get("v"));setSM(p.get("m"));
          setST(p.get("t")||null);
          setSBO(p.get("bo")?p.get("bo").split(","):[]);
          setSTO(p.get("to")?p.get("to").split(","):[]);
          setSSO(p.get("so")?p.get("so").split(","):[]);
          setSMO(p.get("mo")?p.get("mo").split(","):[]);
          setSelColor(p.get("clr")||null);
          setSelIntColor(p.get("iclr")||null);
          if(p.get("ttab"))setTrimTab(p.get("ttab"));
          setCN(decodeURIComponent(p.get("cn")||""));
          setCP(decodeURIComponent(p.get("cp")||""));
          setCAddr(decodeURIComponent(p.get("ca")||""));
          setCNo(decodeURIComponent(p.get("cno")||""));
          setDisc(Number(p.get("dc"))||0);
          const cu=p.get("cu");
          if(cu){try{setCust(JSON.parse(decodeURIComponent(cu)));}catch(e){}}
          setStep(1);
        }
      }catch(e){}
    });
  },[]);

  // 견적 URL 생성
  const makeLink=()=>{
    const p=new URLSearchParams();
    p.set("v",sV||"");p.set("m",sM||"");
    if(sT)p.set("t",sT);
    if(sBO.length)p.set("bo",sBO.join(","));
    if(sTO.length)p.set("to",sTO.join(","));
    if(sSO.length)p.set("so",sSO.join(","));
    if(sMO.length)p.set("mo",sMO.join(","));
    if(selColor)p.set("clr",selColor);
    if(selIntColor)p.set("iclr",selIntColor);
    if(trimTab!=="all")p.set("ttab",trimTab);
    if(cN)p.set("cn",encodeURIComponent(cN));
    if(cP)p.set("cp",encodeURIComponent(cP));
    if(cAddr)p.set("ca",encodeURIComponent(cAddr));
    if(cNo)p.set("cno",encodeURIComponent(cNo));
    if(disc>0)p.set("dc",disc);
    const activeCust=cust.filter(c=>c.on&&c.n&&c.p!==0);
    if(activeCust.length)p.set("cu",encodeURIComponent(JSON.stringify(cust)));
    return window.location.origin+window.location.pathname+"?"+p.toString();
  };
  const copyLink=async()=>{
    const url=makeLink();
    try{
      if(navigator.clipboard&&window.isSecureContext){await navigator.clipboard.writeText(url);showToast("📋 링크가 복사되었습니다!");}
      else{const ta=document.createElement("textarea");ta.value=url;ta.style.position="fixed";ta.style.opacity="0";document.body.appendChild(ta);ta.select();document.execCommand("copy");document.body.removeChild(ta);showToast("📋 링크가 복사되었습니다!");}
    }catch(e){prompt("아래 링크를 복사하세요:",url);}
  };

  const veh=D.vehicles.find(v=>v.id===sV);const mdl=veh?.models.find(m=>m.id===sM);const trm=veh?.trims.find(t=>t.id===sT);
  const tg=(l,s,id)=>s(p=>p.includes(id)?p.filter(x=>x!==id):[...p,id]);
  const vB=()=>trm?.price||0;
  const vBO=()=>veh?veh.baseOptions.filter(o=>sBO.includes(o.id)).reduce((a,o)=>a+o.price,0):0;
  const vCL=()=>{if(!veh?.colors||!selColor)return 0;const cs=veh.colors;const allColors=[...(cs.default||[]),...(cs.xline||[]),...(cs.ch_xline||[]),...(cs.calli||[]),...(cs.brown||[])];const c=allColors.find(x=>x.id===selColor);return c?.price||0;};
  const vTO=()=>veh?(veh.trimOptions[sT]||[]).filter(o=>sTO.includes(o.id)).reduce((a,o)=>a+o.price,0):0;
  const vS=()=>vB()+vBO()+vCL()+vTO();
  const sC=()=>veh?veh.commonSpecial.filter(o=>sSO.includes(o.id)).reduce((a,o)=>a+o.price,0):0;
  const sMd=()=>mdl?mdl.options.filter(o=>sMO.includes(o.id)).reduce((a,o)=>a+o.price,0):0;
  const sCu=()=>cust.filter(c=>c.on&&c.n&&c.p!==0).reduce((a,c)=>a+c.p,0);
  const sS=()=>sC()+sMd()+sCu();
  // 세금 계산 (CHALLENGER: 개별소비세 3.5% + 교육세)
  const calcTax=()=>{
    if(!veh?.hasTax) return {indTax:0,eduTax:0,total:0};
    if(veh.taxMode==="specialOnly"){
      // 싼타페: 특장 부분만 세금 적용 (순정차는 이미 세금 포함)
      const specialBase=sS();
      if(specialBase<=0) return {indTax:0,eduTax:0,total:0};
      const supplyPrice=specialBase/1.1;
      const indTax=Math.round(supplyPrice*0.035);
      const eduTax=Math.round(indTax*0.3);
      return {indTax,eduTax,total:indTax+eduTax};
    }
    // 카니발 챌린저: 전체 금액에 세금 적용
    const base=(vS()+sS()-disc);
    const supplyPrice=base/1.1;
    const indTax=Math.round(supplyPrice*0.035);
    const eduTax=Math.round(indTax*0.3);
    return {indTax,eduTax,total:indTax+eduTax};
  };
  const tot=()=>vS()+sS()-disc+calcTax().total;
  const doSv=async nd=>{setD(nd);const ok=await sv(nd);setSMsg(ok?"✅ 저장":"❌ 실패");setTimeout(()=>setSMsg(""),2000);};

  if(!loaded) return (<div style={{minHeight:"100vh",display:"flex",alignItems:"center",justifyContent:"center",background:"#fff",fontFamily:F}}><FL /><div style={{color:"#bbb"}}>로딩 중...</div></div>);

  // Toast overlay
  const toastEl = toast ? (<div style={{position:"fixed",top:0,left:0,right:0,bottom:0,zIndex:99999,display:"flex",alignItems:"center",justifyContent:"center",pointerEvents:"none"}}><div style={{background:"rgba(0,0,0,0.85)",color:"#fff",padding:"20px 40px",borderRadius:16,fontSize:18,fontWeight:800,boxShadow:"0 12px 40px rgba(0,0,0,0.4)",animation:"fadeIn 0.3s ease",textAlign:"center",maxWidth:"90%"}}>{toast}</div></div>) : null;

  // Render toast on every step
  if(step===0) return(<div style={{minHeight:"100vh",background:"#ffffff",padding:"40px 20px",fontFamily:F}}>{toastEl}<FL />
      <div style={{maxWidth:1200,margin:"0 auto",position:"relative"}}>
        <img src={LOGO} alt="logo" style={{position:"absolute",top:0,right:0,width:72,height:72,objectFit:"contain",borderRadius:0,boxShadow:"0 2px 12px rgba(0,0,0,0.08)"}} />
        <div style={{textAlign:"center",marginBottom:52}}>
          <div style={{fontSize:12,letterSpacing:6,color:"#999",fontWeight:600,marginBottom:6}}>FAMILY CARAVAN</div>
          <h1 style={{fontSize:34,fontWeight:900,color:"#1a1a1a",margin:0}}>전체 라인 견적시스템</h1>
          <div style={{fontSize:13,color:"#bbb",fontWeight:600,marginTop:6}}>Ver.1.0 Beta</div>
          <div style={{width:40,height:2,background:GD,margin:"12px auto 0"}} />
        </div>
        {(()=>{
          const groups=[];const seen={};
          D.vehicles.forEach(v=>{
            if(!seen[v.badge]){seen[v.badge]=[];groups.push(v.badge);}
            seen[v.badge].push(v);
          });
          return groups.map(badge=>{
            const vehs=seen[badge];
            const first=vehs[0];
            return(<div key={badge} style={{marginBottom:40}}>
              <div style={{display:"flex",alignItems:"center",justifyContent:"center",gap:8,marginBottom:14}}>
                <div style={{background:first.id==="carnival"?"#1a1a1a":badge==="CHALLENGER"?"#DC2626":first.id==="pv5"?"#0369A1":"#555",color:"#fff",padding:"3px 14px",borderRadius:20,fontSize:12,fontWeight:800,letterSpacing:2}}>{badge}</div>
                <div style={{fontSize:19,fontWeight:800,color:"#333"}}>{vehs[0].name}</div>
              </div>
              <div style={{display:"flex",flexWrap:"wrap",gap:10,justifyContent:"center",maxWidth:560,margin:"0 auto"}}>
                {vehs.flatMap(v=>v.models.map(m=><MC key={m.id} m={m} onClick={()=>{setSV(v.id);setSM(m.id);setST(null);setSSO(v.commonSpecial.filter(o=>o.required).map(o=>o.id));setSBO([]);setSTO([]);setSMO([]);setSelColor(null);setSelIntColor(null);setTrimTab(v.id==="ch_santafe"?"sf_g":"all");setDisc(0);setCust([{n:"",p:0,on:false},{n:"",p:0,on:false},{n:"",p:0,on:false},{n:"",p:0,on:false}]);setStep(1);}} />))}
              </div>
            </div>);
          });
        })()}
        <div style={{textAlign:"center",marginTop:20}}><button onClick={()=>{setAA(false);setAP("");setAE(false);setStep(3);}} style={{...bL,fontSize:12,color:"#ccc",borderColor:"#eee"}}>🔒 관리자</button></div>
      </div>
    </div>
  );

  // ═══ STEP 1 ═══
  if(step===1) return(
    <div style={{minHeight:"100vh",background:"#fafafa",padding:"20px 14px",fontFamily:F}}>{toastEl}<FL />
      <div style={{maxWidth:1040,margin:"0 auto"}}>
        <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",marginBottom:20,flexWrap:"wrap",gap:10}}>
          <button onClick={()=>setStep(0)} style={bL}>← 모델 선택</button>
          <div style={{textAlign:"right"}}><div style={{fontSize:11,color:GD,letterSpacing:3,fontWeight:700}}>{veh?.badge} · {mdl?.subtitle}</div><div style={{fontSize:22,fontWeight:900,color:"#1a1a1a"}}>{mdl?.name}</div></div>
        </div>
        <div className="resp-grid-main" style={{display:"grid",gridTemplateColumns:"1fr 280px",gap:16,alignItems:"start"}}>
          <div style={{display:"flex",flexDirection:"column",gap:12}}>
            <Sc t="고객 정보" ic="👤"><div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:10}}><In l="고객명" v={cN} s={setCN} ph="고객명 입력" /><In l="연락처" v={cP} s={setCP} ph="010-0000-0000" /></div><In l="주소" v={cAddr} s={setCAddr} ph="주소 입력" mt={8} /><In l="비고" v={cNo} s={setCNo} ph="특이사항" mt={8} /></Sc>
            {veh?.id==="pv5"&&<div style={{padding:"12px 16px",background:"#FFFBEB",borderRadius:8,border:"1px solid #FDE68A",fontSize:13,color:"#92400E",fontWeight:900,lineHeight:1.6}}>※ PV5 차량 가격은 보조금이 반영된 견적으로 따로 반영됩니다. 아래 견적은 특장비만 반영됩니다. 참조부탁드립니다.</div>}
            <GL t="순정차 (베이스)" c={BL} />
            <Sc t="트림 선택 (선택사항)" ic="🚗" bg="#F5F8FF">
              {veh?.id==="ch_santafe"&&<div style={{display:"flex",gap:6,marginBottom:10}}>{[{k:"sf_g",l:"가솔린 2.5T"},{k:"sf_h",l:"하이브리드 1.5T"},{k:"sf_ha",l:"하이브리드 AWD"}].map(tb=><button key={tb.k} onClick={()=>{setTrimTab(tb.k);setST(null);setSTO([]);setSelColor(null);setSelIntColor(null);}} style={{padding:"6px 14px",borderRadius:20,border:"none",cursor:"pointer",fontSize:12,fontWeight:700,background:trimTab===tb.k?"#2563EB":"#E0EDFF",color:trimTab===tb.k?"#fff":"#2563EB"}}>{tb.l}</button>)}</div>}
              <div className="resp-grid-2col" style={{display:"grid",gridTemplateColumns:"repeat(2,1fr)",gap:8}}>{(veh?.id==="ch_santafe"?veh.trims.filter(t=>t.id.startsWith(trimTab)):veh?.trims||[]).map(t=><TC key={t.id} t={t} sel={sT===t.id} oc={()=>{if(sT===t.id){setST(null);setSTO([]);}else{setST(t.id);setSTO([]);setSelColor(null);setSelIntColor(null);}}} />)}</div>
            </Sc>
            {veh?.colors&&<Sc t="외장 색상" ic="🎨" bg="#F5F8FF">{(()=>{const cs=veh.colors;if(sT==="xline"||sT==="ch_xline") return cs.xline||cs.ch_xline||cs.default||[];if(sT&&(sT.includes("calli")||sT.includes("ink"))) return cs.calli||cs.default||[];if(sT&&sT.includes("brown")) return cs.brown||cs.default||[];return cs.default||[];})().map(c=>(<div key={c.id} onClick={()=>setSelColor(selColor===c.id?null:c.id)} style={{display:"flex",alignItems:"center",gap:10,padding:"8px 10px",borderRadius:7,cursor:"pointer",background:selColor===c.id?"#E0EDFF":"transparent",marginBottom:3}}><div style={{width:17,height:17,borderRadius:99,flexShrink:0,border:selColor===c.id?"3px solid #2563EB":"2px solid #ccc",background:selColor===c.id?"#2563EB":"transparent",display:"flex",alignItems:"center",justifyContent:"center"}}>{selColor===c.id&&<div style={{width:7,height:7,borderRadius:99,background:"#fff"}} />}</div><div style={{flex:1}}><div style={{fontSize:13,fontWeight:600,color:selColor===c.id?"#1E40AF":"#555"}}>{c.name}</div></div><div style={{fontSize:13,fontWeight:700,color:selColor===c.id?"#1E40AF":"#888"}}>{c.price>0?fmt(c.price)+"원":"0원"}</div></div>))}</Sc>}
            {veh?.interiorColors&&sT&&(veh.interiorColors[sT]||[]).length>0&&<Sc t="내장 색상" ic="🪑" bg="#F5F8FF">{(veh.interiorColors[sT]||[]).map(c=>(<div key={c.id} onClick={()=>setSelIntColor(selIntColor===c.id?null:c.id)} style={{display:"flex",alignItems:"center",gap:10,padding:"8px 10px",borderRadius:7,cursor:"pointer",background:selIntColor===c.id?"#E0EDFF":"transparent",marginBottom:3}}><div style={{width:17,height:17,borderRadius:99,flexShrink:0,border:selIntColor===c.id?"3px solid #2563EB":"2px solid #ccc",background:selIntColor===c.id?"#2563EB":"transparent",display:"flex",alignItems:"center",justifyContent:"center"}}>{selIntColor===c.id&&<div style={{width:7,height:7,borderRadius:99,background:"#fff"}} />}</div><div style={{flex:1}}><div style={{fontSize:13,fontWeight:600,color:selIntColor===c.id?"#1E40AF":"#555"}}>{c.name}</div></div><div style={{fontSize:13,fontWeight:700,color:selIntColor===c.id?"#1E40AF":"#888"}}>{c.price>0?fmt(c.price)+"원":"0원"}</div></div>))}</Sc>}
            {veh?.baseOptions.length>0&&<Sc t="공통 선택품목" ic="⚙️" bg="#F5F8FF">{veh.baseOptions.map(o=><OR key={o.id} it={o} ck={sBO.includes(o.id)} tg={()=>tg(sBO,setSBO,o.id)} />)}</Sc>}
            {(veh?.trimOptions[sT]||[]).length>0&&<Sc t={`${trm?.name} 선택품목`} ic="🔧" bg="#F5F8FF">{(veh.trimOptions[sT]||[]).map(o=><OR key={o.id} it={o} ck={sTO.includes(o.id)} tg={()=>tg(sTO,setSTO,o.id)} />)}</Sc>}
            {veh?.commonSpecial.length>0&&<Sc t="공통 선택품목" ic="📦" bg="#F5F8FF">{veh.commonSpecial.map(o=><OR key={o.id} it={o} ck={sSO.includes(o.id)} tg={()=>tg(sSO,setSSO,o.id)} />)}</Sc>}
            {mdl?.options.length>0&&<GL t="특장 옵션" c={GD} />}
            <Sc t={`${mdl?.name} 특장`} ic="⭐" ac={mdl?.color} bg="#FFF8EE">{mdl?.options.map(o=><OR key={o.id} it={o} ck={sMO.includes(o.id)} tg={()=>tg(sMO,setSMO,o.id)} sd />)}</Sc>
            <Sc t="커스텀 옵션" ic="✏️" bg="#FFF8EE">{cust.map((c,i)=>(<div key={i} style={{display:"flex",alignItems:"center",gap:6,padding:"6px 8px",borderRadius:6,marginBottom:3,background:c.on?"#FFEFD5":"transparent"}}><div onClick={()=>{const n=[...cust];n[i]={...n[i],on:!n[i].on};setCust(n);}} style={{width:16,height:16,borderRadius:3,flexShrink:0,border:c.on?`2px solid ${GD}`:"2px solid #ddd",background:c.on?GD:"transparent",display:"flex",alignItems:"center",justifyContent:"center",fontSize:11,color:"#fff",fontWeight:900,cursor:"pointer"}}>{c.on&&"✓"}</div><input type="text" value={c.n} placeholder="옵션명 입력" onChange={e=>{const n=[...cust];n[i]={...n[i],n:e.target.value};setCust(n);}} style={{flex:1,...iS,minWidth:0}} /><input type="number" value={c.p||""} placeholder="금액" onChange={e=>{const n=[...cust];n[i]={...n[i],p:Number(e.target.value)};setCust(n);}} style={{width:110,...iS,textAlign:"right",fontWeight:700,color:c.p<0?"#ef4444":"#222"}} /><span style={{fontSize:12,color:c.p<0?"#ef4444":"#bbb"}}>원</span></div>))}</Sc>
            <Sc t="할인" ic="💰"><div style={{display:"flex",alignItems:"center",gap:8}}><span style={{color:"#999",fontSize:14}}>할인</span><input type="number" value={disc||""} onChange={e=>setDisc(Number(e.target.value)||0)} style={{flex:1,...iS,fontSize:16,fontWeight:700,textAlign:"right"}} /><span style={{color:"#999",fontSize:14}}>원</span></div></Sc>
          </div>
          <div className="resp-sticky" style={{position:"sticky",top:16}}>
            <div style={{background:"#fff",border:"1px solid #eee",borderRadius:14,padding:18,boxShadow:"0 2px 12px rgba(0,0,0,0.04)"}}>
              <div style={{fontSize:17,color:GD,letterSpacing:3,fontWeight:800}}>TOTAL</div>
              <div style={{display:"inline-block",background:"#f8f6f0",borderRadius:4,padding:"2px 8px",fontSize:11,color:GD,fontWeight:700,marginTop:3,marginBottom:6}}>◆ VAT 포함</div>
              <div style={{fontSize:34,fontWeight:900,color:"#1a1a1a",marginBottom:6,lineHeight:1}}>{fmt(tot())}<span style={{fontSize:15,fontWeight:400,color:"#bbb",marginLeft:2}}>원</span></div>
              {vS()>0&&<div style={{background:"#EBF2FF",borderRadius:8,padding:"10px 12px",marginTop:8,marginBottom:6}}>
              <div style={{fontSize:20,color:"#1E40AF",letterSpacing:2,fontWeight:700,marginBottom:5}}>순정차</div>
              <SL l="베이스" v={vB()} />{vBO()>0&&<SL l="공통선택" v={vBO()} />}{selColor&&<SL l="색상" v={vCL()} />}{vTO()>0&&<SL l="트림옵션" v={vTO()} />}
              <div style={{display:"flex",justifyContent:"space-between",padding:"8px 0 4px",borderTop:"1px solid #D0E0FF",marginTop:5,fontSize:21}}><span style={{color:"#1E40AF",fontWeight:700}}>소계</span><span style={{color:"#1a1a1a",fontWeight:800}}>{fmt(vS())}원</span></div>
              </div>}
              {sS()>0&&<div style={{background:"#FFF5E6",borderRadius:8,padding:"10px 12px",marginBottom:6}}>
              <div style={{fontSize:20,color:"#92400E",letterSpacing:2,fontWeight:700,marginBottom:5}}>특장</div>
              {sC()>0&&<SL l="공통특장" v={sC()} />}{sMd()>0&&<SL l={mdl?.name} v={sMd()} />}{sCu()>0&&<SL l="커스텀" v={sCu()} />}
              <div style={{display:"flex",justifyContent:"space-between",padding:"8px 0 4px",borderTop:"1px solid #FFE0B2",marginTop:5,fontSize:21}}><span style={{color:"#92400E",fontWeight:700}}>소계</span><span style={{color:"#1a1a1a",fontWeight:800}}>{fmt(sS())}원</span></div>
              </div>}
              {disc>0&&<SL l="할인" v={-disc} d />}
              {veh?.hasTax&&calcTax().total>0&&<div style={{background:"#FEF2F2",borderRadius:8,padding:"8px 12px",marginTop:6,marginBottom:4}}>
              <div style={{fontSize:14,color:"#991B1B",fontWeight:700,marginBottom:4}}>세금 {veh.taxMode==="specialOnly"?"(특장 부분만 적용)":""}</div>
              <SL l="개별소비세 (3.5%)" v={calcTax().indTax} />
              <SL l="교육세 (개소세의 30%)" v={calcTax().eduTax} />

            <h3 style={{fontSize:15,fontWeight:800,color:GD,marginBottom:14}}>비밀번호 변경</h3>
            <div style={{display:"flex",alignItems:"center",gap:8}}><span style={{fontSize:13,color:"#999"}}>비밀번호</span><input type="text" value={D.adminPw} onChange={e=>up(d=>{d.adminPw=e.target.value;})} style={{width:180,...iS}} /></div>
            <div style={{marginTop:20,padding:"12px 16px",background:"#FFF5F5",borderRadius:6,border:"1px solid #fee"}}><div style={{fontSize:13,fontWeight:700,color:"#c00",marginBottom:4}}>⚠️ 초기화</div><button onClick={()=>{if(window.confirm("모든 데이터를 초기화?")){doSv(DD);}}} style={{padding:"6px 14px",background:"#ef4444",color:"#fff",border:"none",borderRadius:5,fontSize:12,fontWeight:700,cursor:"pointer"}}>초기화</button></div>
          </div>}
        </div>
      </div>
    </div>);
  }
  return null;
}

function MC({m,onClick}){const[h,setH]=useState(false);return(<div onClick={onClick} onMouseEnter={()=>setH(true)} onMouseLeave={()=>setH(false)} style={{width:170,background:"#fff",border:`1px solid ${h?"#ccc":"#eee"}`,borderRadius:12,padding:"22px 18px",cursor:"pointer",transition:"all 0.2s",transform:h?"translateY(-2px)":"none",boxShadow:h?"0 8px 20px rgba(0,0,0,0.06)":"0 1px 3px rgba(0,0,0,0.02)",position:"relative",overflow:"hidden"}}><div style={{position:"absolute",top:0,left:0,right:0,height:3,background:`linear-gradient(90deg,${m.color},${m.color}88)`}} /><div style={{fontSize:10,color:GD,letterSpacing:3,marginBottom:6,fontWeight:700}}>{m.subtitle}</div><div style={{fontSize:18,fontWeight:900,color:"#1a1a1a",marginBottom:4,whiteSpace:"pre-line",lineHeight:1.3}}>{m.name}</div><div style={{fontSize:12,color:"#bbb",marginBottom:14}}>옵션 {m.options.length}종</div><div style={{color:GD,fontSize:12,fontWeight:700}}>견적 시작 →</div></div>);}
function GL({t,c}){const bg=c===BL?"linear-gradient(90deg,#EBF2FF,#E0EDFF)":"linear-gradient(90deg,#FFF5E6,#FFEDCC)";return(<div style={{display:"flex",alignItems:"center",gap:8,padding:"10px 14px",borderRadius:8,background:bg,marginTop:4}}><div style={{width:5,height:18,borderRadius:3,background:c}} /><div style={{fontSize:16,fontWeight:900,color:c===BL?"#1E40AF":"#92400E"}}>{t}</div></div>);}
function Sc({t,ic,ac,bg,children}){return(<div style={{background:bg||"#fff",border:"1px solid "+(bg?"transparent":"#eee"),borderRadius:10,padding:"14px 16px"}}><div style={{display:"flex",alignItems:"center",gap:6,marginBottom:10}}>{ac&&<div style={{width:3,height:12,borderRadius:2,background:ac}} />}{ic&&<span style={{fontSize:14}}>{ic}</span>}<div style={{fontSize:13.5,fontWeight:800,color:ac||GD}}>{t}</div></div>{children}</div>);}
function In({l,v,s,ph,mt}){return(<div style={{marginTop:mt||0}}><div style={{fontSize:11,color:"#bbb",marginBottom:3,fontWeight:600}}>{l}</div><input type="text" value={v} onChange={e=>s(e.target.value)} placeholder={ph} style={{width:"100%",...iS}} /></div>);}
function TC({t,sel,oc}){return(<div onClick={oc} style={{padding:"10px 12px",borderRadius:7,cursor:"pointer",border:sel?"2px solid #1a1a1a":"1px solid #ddd",background:sel?"#fafafa":"#fff"}}><div style={{fontSize:13.5,fontWeight:700,color:sel?"#1a1a1a":"#555"}}>{t.name}</div><div style={{fontSize:15,fontWeight:800,color:sel?"#1a1a1a":"#888",marginTop:2}}>{fmt(t.price)}원</div></div>);}
function OR({it,ck,tg,lk,sd}){const neg=it.price<0;return(<div onClick={lk?undefined:tg} style={{display:"flex",alignItems:"center",gap:8,padding:"7px 8px",borderRadius:6,cursor:lk?"default":"pointer",background:ck?(neg?"#FEF2F2":"#fafafa"):"transparent",marginBottom:2}}><div style={{width:15,height:15,borderRadius:3,flexShrink:0,border:ck?(neg?"2px solid #ef4444":"2px solid #1a1a1a"):"2px solid #aaa",background:ck?(neg?"#ef4444":"#1a1a1a"):"transparent",display:"flex",alignItems:"center",justifyContent:"center",fontSize:11,color:"#fff",fontWeight:900}}>{ck&&"✓"}</div><div style={{flex:1,minWidth:0}}><div style={{fontSize:13,fontWeight:600,color:ck?(neg?"#ef4444":"#1a1a1a"):"#555"}}>{it.name}</div>{sd&&it.desc&&<div style={{fontSize:11.5,color:"#888",marginTop:1,lineHeight:1.3}}>{it.desc}</div>}</div><div style={{textAlign:"right",flexShrink:0}}>{it.originalPrice>0&&<div style={{fontSize:11,color:"#999",textDecoration:"line-through"}}>{fmt(it.originalPrice)}</div>}<div style={{fontSize:13.5,fontWeight:700,color:neg?(ck?"#ef4444":"#e88"):(ck?"#1a1a1a":"#888")}}>{fmt(it.price)}원</div></div></div>);}
function SL({l,v,d}){return(<div style={{display:"flex",justifyContent:"space-between",padding:"4px 0",fontSize:16}}><span style={{color:"#666"}}>{l}</span><span style={{color:d?"#ef4444":"#333",fontWeight:600}}>{d&&"-"}{fmt(Math.abs(v))}원</span></div>);}
function PH({t,c,mt}){return(<div style={{display:"flex",alignItems:"center",gap:6,padding:"6px 0 4px",marginTop:mt||0}}><div style={{width:4,height:12,borderRadius:2,background:c}} /><div style={{fontSize:15,fontWeight:900,color:"#333"}}>{t}</div><div style={{flex:1,height:1,background:"#eee"}} /></div>);}
function IB({l,a,b,c}){return(<div style={{background:"#fafafa",borderRadius:4,padding:"9px 12px",border:"1px solid #f0f0f0"}}><div style={{fontSize:12,color:GD,letterSpacing:2,marginBottom:4,fontWeight:700}}>{l}</div><div style={{fontSize:16,fontWeight:700,color:"#1a1a1a"}}>{a}</div><div style={{fontSize:14,color:"#999",marginTop:1}}>{b}</div>{c&&<div style={{fontSize:13,color:"#888",marginTop:2}}>{c}</div>}</div>);}
function Th({children,w,a="center"}){return<th style={{padding:"6px 10px",textAlign:a,fontSize:13.5,fontWeight:700,color:"#777",width:w}}>{children}</th>;}
function Td({children,a="left",b,c,s,m}){return<td style={{padding:"6px 10px",textAlign:a,fontSize:s||10.5,fontWeight:b?700:400,color:c||"#333",fontVariantNumeric:m?"tabular-nums":undefined}}>{children}</td>;}
const bL={background:"#fff",border:"1px solid #eee",color:"#888",padding:"7px 12px",borderRadius:6,cursor:"pointer",fontSize:13,fontWeight:600};
const iS={background:"#fafafa",border:"1px solid #eee",borderRadius:5,color:"#222",padding:"6px 9px",fontSize:13,outline:"none"};
const dB={background:"none",border:"1px solid #fcc",color:"#c00",borderRadius:3,padding:"1px 5px",fontSize:11,cursor:"pointer"};
const aB={background:"#fafafa",border:"1px solid #eee",borderRadius:5,padding:"5px 12px",fontSize:12,fontWeight:700,color:"#999",cursor:"pointer",marginTop:6};
const thC={padding:"4px 8px",background:"#f7f7f7",fontWeight:600,color:"#888",borderRight:"1px solid #ccc",borderBottom:"1px solid #eee",width:"13%"};
const tdC={padding:"4px 8px",borderBottom:"1px solid #eee",color:"#222",fontWeight:600};

const root = ReactDOM.createRoot(document.getElementById('root'));
root.render(React.createElement(App));
</script>
</body>
</html>
