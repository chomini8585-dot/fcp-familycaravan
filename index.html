          <tr><td style={ch}>주민등록번호★</td><td colSpan={5} style={cs}><input type="text" value={ctSsn} onChange={e=>setCtSsn(e.target.value)} placeholder="주민등록번호" style={ctIn} /></td></tr>
          <tr><td style={ch}>주소★</td><td colSpan={5} style={cs}><input type="text" value={ctAddr} onChange={e=>setCtAddr(e.target.value)} style={ctIn} /></td></tr>

          <tr><td rowSpan={4} style={{...ch,width:"5%",textAlign:"center",verticalAlign:"middle",fontSize:13,letterSpacing:3}}>고<br/>객<br/>(2)</td><td style={{...ch}}>성명(상호)★</td><td style={cs}><input type="text" value={ctName2} onChange={e=>setCtName2(e.target.value)} style={ctIn} /></td><td style={{...cs,width:"4%"}}>(인)</td><td style={{...ch}}>대리인★</td><td style={cs}></td><td style={{...ch}}>관계:</td></tr>
          <tr><td style={ch}>주민등록번호★</td><td colSpan={5} style={cs}><input type="text" value={ctSsn2} onChange={e=>setCtSsn2(e.target.value)} placeholder="주민등록번호" style={ctIn} /></td></tr>
          <tr><td style={ch}>주소★</td><td colSpan={5} style={cs}><input type="text" value={ctAddr2} onChange={e=>setCtAddr2(e.target.value)} style={ctIn} /></td></tr>
          <tr><td style={ch}>전화번호</td><td style={cs}><input type="text" value={ctPhone2} onChange={e=>phoneFormat(e.target.value,setCtPhone2)} placeholder="H/P" style={ctIn} /></td><td colSpan={2} style={cs}><input type="text" value={ctHomePhone2} onChange={e=>setCtHomePhone2(e.target.value)} placeholder="자택" style={ctIn} /></td><td style={ch}>E-mail</td><td style={cs}><input type="text" value={ctEmail2} onChange={e=>setCtEmail2(e.target.value)} style={ctIn} /></td></tr>
        </tbody></table>
        <div style={{marginTop:8,fontSize:14,fontWeight:900,marginBottom:4}}>■ 매도인</div>
        <div style={{border:"1px solid #555",padding:"8px 12px"}}><div style={{textAlign:"right",fontSize:12,marginBottom:6}}>(인) 고객의 성명, 주소, 개인정보는 고객 자필(날인)임을 확인함.</div><div style={{display:"flex",justifyContent:"space-between",fontSize:13,marginBottom:6}}><div>판매자 <span style={{fontWeight:700}}>{SELLER}</span></div><div>판매자 성명 : <span style={{fontWeight:700}}>{SELLER}</span> (인)</div></div><div style={{fontSize:11,color:"#888"}}>※ (★ 칸)은 고객 필수 자필 기재사항입니다.</div><div style={{fontSize:13,fontWeight:700,marginTop:4}}>입금계좌 <span style={{color:"#1E40AF"}}>{BANK}</span></div></div>
      </div></div></div></div>);
  }


  if(step===7){
    /* PL 데이터 빌더 - 특정 모델(model) 기준으로 가격표 데이터 생성 */
    var buildPLOpts=function(modelKey){
      /* modelKey 형식: "vehicleId__modelId" */
      var parts=modelKey.split("__");
      var vehId=parts[0];var modId=parts[1];
      var v=D.vehicles.find(function(x){return x.id===vehId;});
      if(!v)return null;
      var m=v.models.find(function(x){return x.id===modId;});
      if(!m)return null;
      var trims=v.trims.map(function(t){
        return {name:t.name,subtitle:"",tag:t.name,price:t.price};
      });
      /* 옵션: 해당 모델의 옵션만 */
      var options=(m.options||[]).map(function(o){
        return {name:o.name,price:o.price||0};
      });
      var modelName=m.name.replace(/\\n/g," ");
      return {
        badge:v.badge||"",
        title:"FCP 리무진 "+modelName+" 특장 가격표",
        subtitle:modelName+" 특장차량 견적안내  FCP리무진 용인직영점 패밀리카라반",
        trims:trims,
        optTitle:"특장 옵션 — "+modelName,
        optSub:"원하시는 옵션에 체크 후 담당자에게 제출해 주세요",
        options:options.length?options:[{name:"옵션 정보 없음",price:0}],
      };
    };

    var openPL=function(m,autoprint){
      try{
        var origHtml,key;
        /* m이 cargo/passenger 외인 경우 → 모델 기반 동적 생성 */
        if(m!=="cargo"&&m!=="passenger"){
          var opts=buildPLOpts(m);
          if(!opts){showToast("모델 정보를 찾을 수 없습니다");return;}
          origHtml=window.generatePL(opts);
          key="pl_"+m.replace(/[^a-zA-Z0-9_]/g,"_");
        }else{
          origHtml=m==="cargo"?window.PL_CARGO:window.PL_PASS;
          key=m==="cargo"?"pl_cargo":"pl_passenger";
        }
        var openWin=function(htmlContent){
          var w=window.open("","_blank");
          if(!w){showToast("팝업을 허용해주세요");return;}
          w.document.write(htmlContent);
          w.document.close();
          try{w.PL_KEY=key;}catch(_){setTimeout(function(){try{w.PL_KEY=key;}catch(__){}},100);}
          /* 자동 인쇄: 페이지 로드 후 doPrint 호출 */
          if(autoprint){
            var tryPrint=function(attempts){
              if(attempts<=0)return;
              try{
                if(w.closed)return;
                if(typeof w.doPrint==="function"){
                  w.doPrint();
                }else{
                  setTimeout(function(){tryPrint(attempts-1);},300);
                }
              }catch(e){setTimeout(function(){tryPrint(attempts-1);},300);}
            };
            setTimeout(function(){tryPrint(10);},800);
          }
        };
        if(window.db){
          showToast("저장된 버전 확인 중...");
          window.db.collection("brochures").doc(key).get().then(function(doc){
            if(doc.exists&&doc.data().pageHtml){
              var saved=doc.data().pageHtml;
              var merged=origHtml.replace(/<div class='page'>[\s\S]*?<\/div><\/div><script>/,saved.replace(/<\/div>\s*$/,"")+"</div><script>");
              var pageRe=/<div class=['"]page['"][^>]*>[\s\S]*?<\/div>(?=<\/div><script>)/;
              if(pageRe.test(origHtml)){
                merged=origHtml.replace(pageRe,saved);
              }
              openWin(merged);
              showToast("✅ 저장된 버전을 불러왔습니다");
            }else{
              openWin(origHtml);
            }
          }).catch(function(e){
            console.warn("브로셔 로드 실패:",e);
            openWin(origHtml);
          });
        }else{
          openWin(origHtml);
        }
      }catch(e){showToast("오류: "+e.message);}
    };
    /* 사이드바에서 직접 열기 신호 받으면 인라인 표시 (팝업X) */
    /* (autoOpenPL이 설정되어 있으면 아래 화면 분기에서 iframe으로 표시) */
    /* 메시지 수신: 새 창에서 저장 요청 */
    if(!window._plMsgBound){
      window._plMsgBound=true;
      window.addEventListener("message",function(e){
        if(!e.data||e.data.type!=="pl_save")return;
        var key=e.data.key;
        var pageHtml=e.data.html;
        if(!key||!pageHtml)return;
        if(!window.db){
          if(e.source)try{e.source.postMessage({type:"pl_save_result",success:false,error:"Firebase 연결 없음 (오프라인)"},"*");}catch(_){}
          return;
        }
        var data={key:key,pageHtml:pageHtml,updatedAt:firebase.firestore.FieldValue.serverTimestamp(),updatedAtLocal:new Date().toISOString()};
        var done=false;
        var timer=setTimeout(function(){if(!done&&e.source)try{e.source.postMessage({type:"pl_save_result",success:false,error:"⏳ Firestore 보안규칙 또는 네트워크 문제"},"*");}catch(_){}},5000);
        window.db.collection("brochures").doc(key).set(data,{merge:true}).then(function(){
          done=true;clearTimeout(timer);
          if(e.source)try{e.source.postMessage({type:"pl_save_result",success:true},"*");}catch(_){}
          showToast("✅ 가격표 저장 완료: "+key);
        }).catch(function(err){
          done=true;clearTimeout(timer);
          if(e.source)try{e.source.postMessage({type:"pl_save_result",success:false,error:err.message},"*");}catch(_){}
        });
      });
    }
    /* 저장된 버전 초기화 */
    var resetSaved=function(m){
      var key,label;
      if(m==="cargo"){key="pl_cargo";label="PV5 카고";}
      else if(m==="passenger"){key="pl_passenger";label="PV5 패신저";}
      else{
        /* m = "vehicleId__modelId" */
        var parts=m.split("__");
        var vv=D.vehicles.find(function(x){return x.id===parts[0];});
        var mm=vv?vv.models.find(function(x){return x.id===parts[1];}):null;
        if(!mm){showToast("모델 정보 없음");return;}
        key="pl_"+m.replace(/[^a-zA-Z0-9_]/g,"_");
        label=mm.name.replace(/\\n/g," ");
      }
      if(!confirm("⚠️ "+label+" 가격표의 저장된 수정사항을 모두 삭제하고 원본으로 되돌릴까요?"))return;
      if(!window.db){showToast("Firebase 연결 없음");return;}
      window.db.collection("brochures").doc(key).delete().then(function(){
        showToast("✅ "+label+" 원본으로 복원됨");
      }).catch(function(err){
        showToast("❌ 초기화 실패: "+err.message);
      });
    };
    var cS={width:280,background:"#fff",border:"2px solid #1b2f4e",borderRadius:16,padding:"32px 24px",cursor:"pointer",textAlign:"center",boxShadow:"0 2px 12px rgba(27,47,78,0.08)",transition:"all 0.2s"};
    var bS={background:"#1b2f4e",color:"#fff",padding:"10px 0",borderRadius:8,fontSize:14,fontWeight:800,marginTop:16};
    var oe=function(e){e.currentTarget.style.transform="translateY(-3px)";e.currentTarget.style.boxShadow="0 8px 24px rgba(27,47,78,0.18)";};
    var ol=function(e){e.currentTarget.style.transform="none";e.currentTarget.style.boxShadow="0 2px 12px rgba(27,47,78,0.08)";};
    /* autoOpenPL이 설정되어 있으면: 카드 그리드 대신 iframe으로 가격표 인라인 표시 */
    if(autoOpenPL){
      const _target=autoOpenPL;
      let _origHtml,_label;
      if(_target==="cargo"){_origHtml=window.PL_CARGO;_label="PV5 카고";}
      else if(_target==="passenger"){_origHtml=window.PL_PASS;_label="PV5 패신저";}
      else{
        const opts=buildPLOpts(_target);
        if(opts){_origHtml=window.generatePL(opts);_label=opts.title.replace("FCP 리무진 ","").replace(" 특장 가격표","");}
      }
      const _key=_target==="cargo"?"pl_cargo":_target==="passenger"?"pl_passenger":"pl_"+_target.replace(/[^a-zA-Z0-9_]/g,"_");
      return(<div style={{minHeight:"100vh",background:"#f0f4f8",fontFamily:F,display:"flex",flexDirection:"column"}}>{toastEl}<FL />
        <SideNav />
        <div className="ent-content-wrap" style={{marginLeft:240,display:"flex",flexDirection:"column",height:"100vh"}}>
          <div style={{padding:"10px 20px",background:"#1b2f4e",color:"#fff",display:"flex",alignItems:"center",justifyContent:"space-between",gap:10,flexWrap:"wrap"}}>
            <div style={{display:"flex",alignItems:"center",gap:10}}>
              <span style={{fontSize:11,letterSpacing:2,color:"#93C5FD",fontWeight:700}}>PRICE LIST</span>
              <span style={{fontSize:15,fontWeight:800}}>{_label}</span>

function OR({it,ck,tg,lk,sd}){const neg=it.price<0;return(<div onClick={lk?undefined:tg} style={{display:"flex",alignItems:"center",gap:8,padding:"7px 8px",borderRadius:6,cursor:lk?"default":"pointer",background:ck?(neg?"#FEF2F2":"#fafafa"):"transparent",marginBottom:2}}><div style={{width:15,height:15,borderRadius:3,flexShrink:0,border:ck?(neg?"2px solid #ef4444":"2px solid #1a1a1a"):"2px solid #aaa",background:ck?(neg?"#ef4444":"#1a1a1a"):"transparent",display:"flex",alignItems:"center",justifyContent:"center",fontSize:11,color:"#fff",fontWeight:900}}>{ck&&"✓"}</div><div style={{flex:1,minWidth:0}}><div style={{fontSize:13,fontWeight:600,color:ck?(neg?"#ef4444":"#1a1a1a"):"#555"}}>{it.name}</div>{sd&&it.desc&&<div style={{fontSize:11.5,color:"#888",marginTop:1,lineHeight:1.3}}>{it.desc}</div>}</div><div style={{textAlign:"right",flexShrink:0}}>{it.originalPrice>0&&<div style={{fontSize:11,color:"#999",textDecoration:"line-through"}}>{fmt(it.originalPrice)}</div>}<div style={{fontSize:13.5,fontWeight:700,color:neg?(ck?"#ef4444":"#e88"):(ck?"#1a1a1a":"#888")}}>{fmt(it.price)}원</div></div></div>);}

function EP({id,price,origPrice,qty,override,setOverride}){
  const[editing,setEditing]=useState(false);
  const[val,setVal]=useState("");
  const isOverridden=id&&override[id]!==undefined;
  const displayPrice=price||0;
  if(!id) return <span>{fmt(displayPrice)}원</span>;
  const q=qty||1;
  const unitPrice=displayPrice/q;  /* 표시된 price는 단가×수량 */
  if(editing){
    return <input type="text" autoFocus value={val}
      onChange={e=>setVal(e.target.value.replace(/[^0-9-]/g,""))}
      onBlur={()=>{
        const n=Number(val);
        if(val===""||isNaN(n)){setEditing(false);return;}
        const unitNew=Math.round(n/q);  /* 수량 있으면 입력값을 단가로 환산 */
        setOverride(p=>{const np={...p};np[id]=unitNew;return np;});
        setEditing(false);
      }}
      onKeyDown={e=>{if(e.key==="Enter")e.target.blur();if(e.key==="Escape"){setEditing(false);}}}
      style={{width:100,padding:"0 4px",margin:0,border:"1.5px solid #2563EB",borderRadius:3,fontSize:"inherit",fontWeight:"inherit",fontFamily:"inherit",textAlign:"right",outline:"none",background:"#fff",verticalAlign:"baseline",boxSizing:"border-box",lineHeight:"inherit"}} />;
  }
  return <span onClick={()=>{setVal(String(displayPrice));setEditing(true);}}
    onDoubleClick={()=>{setOverride(p=>{const np={...p};delete np[id];return np;});}}
    title="클릭: 수정 / 더블클릭: 원래 가격 복원"
    style={{cursor:"pointer",color:isOverridden?"#dc2626":"inherit"}}>
    {fmt(displayPrice)}원{isOverridden&&<span style={{fontSize:9,color:"#dc2626",marginLeft:3,fontWeight:900}}>✎</span>}
  </span>;
}
