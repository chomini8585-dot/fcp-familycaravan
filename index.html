/* ── 공용 컴포넌트: 활성/휴지통 토글 (3곳에서 재사용) ── */
function TrashToggle({active, trash, isTrash, setIsTrash, variant}){
  var sm = variant !== "main";
  var activeColor = sm ? "#166534" : "#1a1a1a";
  var br = sm ? 4 : 6;
  var pad = sm ? "4px 8px" : "6px 12px";
  var fs = sm ? 11 : 12;
  var activeLabel = sm ? ("활성 ("+active+")") : ("📋 활성 ("+active+")");
  var trashLabel = sm ? ("🗑️ ("+trash+")") : ("🗑️ 휴지통 ("+trash+")");
  return (
    <div style={{display:"flex",gap:sm?4:6}}>
      <button onClick={()=>setIsTrash(false)} style={{background:isTrash?"transparent":activeColor,color:isTrash?"#666":"#fff",border:"1px solid "+(isTrash?"#ddd":activeColor),borderRadius:br,padding:pad,fontSize:fs,fontWeight:700,cursor:"pointer"}}>{activeLabel}</button>
      <button onClick={()=>setIsTrash(true)} style={{background:isTrash?"#dc2626":"transparent",color:isTrash?"#fff":"#666",border:"1px solid "+(isTrash?"#dc2626":"#ddd"),borderRadius:br,padding:pad,fontSize:fs,fontWeight:700,cursor:"pointer"}}>{trashLabel}</button>
    </div>
  );
}

    </>);
  };

  /* 모바일 햄버거 토글 버튼 (모든 페이지 좌상단 고정) */

  const fetchAuthHashes=async function(){
    if(!window.db) return {master:SEED_MASTER_HASH,sub:SEED_SUB_HASH};
    try{
      const doc=await window.db.collection("config").doc("auth").get();

        const OLD_MASTER_1234="03ac674216f3e15c761ee1a5e255f067953623c8b388b4459e13f978d7c846f4";

            master:SEED_MASTER_HASH,

            updatedAtLocal:new Date().toISOString(),

  };

              </div>
            ))}

        </div>
        </div>
      </div>);
    }

    /* ─── 오픈격벽 사전예약 관리 ─── */

      const activePart=partitionList.filter(q=>q.deleted!==true);
      const trashPart=partitionList.filter(q=>q.deleted===true);
      const visiblePart=showPartitionTrash?trashPart:activePart;
      const totalDeposit=visiblePart.reduce((a,p)=>a+(p.depositAmount||0),0);
      const totalBalance=visiblePart.reduce((a,p)=>a+(p.balanceAmount||0),0);
      const onPartNum=(k)=>(e)=>setPartitionForm(f=>({...f,[k]:Number(String(e.target.value).replace(/[^0-9-]/g,""))||0}));

          {/* 툴바 */}
          <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:14,flexWrap:"wrap",gap:8}}>
            <div style={{display:"flex",alignItems:"center",gap:10,flexWrap:"wrap"}}>
              <TrashToggle active={activePart.length} trash={trashPart.length} isTrash={showPartitionTrash} setIsTrash={setShowPartitionTrash} variant="main" />
              <button onClick={loadPartitions} style={ghostBtn}>새로고침</button>
            </div>
            {!showPartitionTrash&&<button onClick={()=>{setPartitionForm(PARTITION_BLANK);setEditingPartitionId(null);setPartitionFormOpen(true);}} style={primaryBtn}>+ 신규 등록</button>}
          </div>
          {/* 리스트 */}
          {partitionLoading?<div style={{padding:80,textAlign:"center",color:NEUTRAL.muted,fontSize:14}}>불러오는 중...</div>:
          visiblePart.length===0?<div style={{padding:80,textAlign:"center",color:NEUTRAL.muted,background:"#fff",borderRadius:12,border:"1px solid "+NEUTRAL.bd,fontSize:14}}>{showPartitionTrash?"휴지통이 비어있습니다.":"등록된 예약이 없습니다."}</div>:

                <th style={thSt}>이름</th>
                <th style={thSt}>지역</th>
                <th style={thSt}>계약일</th>

                <th style={{...thSt,textAlign:"center"}}>결제</th>
                <th style={{...thSt,textAlign:"right"}}>잔금</th>
                <th style={{...thSt,textAlign:"center"}}>결제</th>

                return(<React.Fragment key={p.id}>
                  <tr onClick={()=>setExpandedPartitionId(isExpanded?null:p.id)} style={{cursor:"pointer",background:isExpanded?"#EEF2FF":"transparent",transition:"background .12s",boxShadow:isExpanded?"inset 3px 0 0 #6366F1":"none"}} onMouseEnter={e=>{if(!isExpanded)e.currentTarget.style.background="#F1F5F9";}} onMouseLeave={e=>{if(!isExpanded)e.currentTarget.style.background="transparent";}}>

                    <div style={{padding:"14px 18px",background:"#F0FDF4",borderRadius:10,border:"1px solid #86EFAC",display:"flex",justifyContent:"space-between",alignItems:"center"}}>
                      <div style={{fontSize:11,color:NEUTRAL.sub,letterSpacing:0.4,textTransform:"uppercase",fontWeight:600}}>총액 = 계약금 + 잔금</div>
                      <div style={{fontSize:20,fontWeight:700,fontVariantNumeric:"tabular-nums",color:"#15803D"}}>{fmt(total)}원</div>
                    </div>
                  </td></tr>}
                </React.Fragment>);
              })}</tbody>
            </table>
            </div>
          </div>}
          {/* 등록·수정 모달 */}

            <div style={{background:"#fff",borderRadius:14,maxWidth:680,width:"100%",maxHeight:"92vh",overflowY:"auto",boxShadow:"0 24px 80px rgba(0,0,0,0.18)",border:"1px solid "+NEUTRAL.bd}}>
              <div style={{padding:"20px 24px",borderBottom:"1px solid "+NEUTRAL.bd,display:"flex",alignItems:"center",justifyContent:"space-between"}}>
                <div>

                <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:10,marginBottom:14}}>

                  <div><div style={lblSt}>지역</div><input type="text" value={partitionForm.region} onChange={e=>setPartitionForm(f=>({...f,region:e.target.value}))} placeholder="예: 용인시" style={inSt} /></div>

                <div style={{marginBottom:14}}>

    return(

      <SideNav />
      <div className="ent-content-wrap" style={{marginLeft:240,padding:"20px 14px"}}>

        {(()=>{
          const activeQuotes=quotes.filter(q=>q.deleted!==true);

          const visibleQuotes=showTrash?trashQuotes:activeQuotes;

          return (<div>
            <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:8,gap:8,flexWrap:"wrap"}}>

            </div>
            {visibleQuotes.length===0?<div style={{textAlign:"center",padding:60,color:"#bbb",fontSize:16,background:"#fff",borderRadius:12,border:"1px solid #eee"}}>{showTrash?"휴지통이 비어있습니다.":"저장된 견적이 없습니다."}</div>:
            <div className="resp-table-wrap" style={{background:"#fff",borderRadius:12,border:"1px solid #eee",overflow:"hidden"}}>
              <table style={{width:"100%",borderCollapse:"collapse"}}>
                <thead><tr style={{background:"#f8f9fa"}}>
                  <th style={{padding:"10px 12px",textAlign:"left",fontSize:13,fontWeight:700,color:"#555",borderBottom:"2px solid #eee"}}>고객명</th>

        if(m!=="cargo"&&m!=="passenger"){
          var opts=buildPLOpts(m);
          if(!opts){showToast("모델 정보를 찾을 수 없습니다");return;}
          origHtml=window.generatePL(opts);
          key="pl_"+m.replace(/[^a-zA-Z0-9_]/g,"_");
        }else{
          origHtml=m==="cargo"?window.PL_CARGO:window.PL_PASS;
          key=m==="cargo"?"pl_cargo":"pl_passenger";
        }
        var openWin=function(htmlContent){
          /* PL_KEY를 HTML에 미리 주입 (Blob URL은 외부에서 window 변수 설정 타이밍 보장 어려움) */
          var keyJSON=JSON.stringify(key);
          var injected=htmlContent.replace(/<head([^>]*)>/i,'<head$1><script>window.PL_KEY='+keyJSON+';<\/script>');
          if(injected===htmlContent){injected=htmlContent.replace(/<body/i,'<script>window.PL_KEY='+keyJSON+';<\/script><body');}
          var blob=new Blob([injected],{type:"text/html;charset=utf-8"});
          var url=URL.createObjectURL(blob);
          var w=window.open(url,"_blank");
          if(!w){URL.revokeObjectURL(url);showToast("팝업을 허용해주세요");return;}
          setTimeout(function(){try{URL.revokeObjectURL(url);}catch(_){}},30000);
          /* 호환성을 위해 외부에서도 한 번 더 시도 */
          try{w.PL_KEY=key;}catch(_){setTimeout(function(){try{w.PL_KEY=key;}catch(__){}},100);}
          /* 자동 인쇄: 페이지 로드 후 doPrint 호출 */
          if(autoprint){
            var tryPrint=function(attempts){
              if(attempts<=0)return;
              try{
                if(w.closed)return;
                if(typeof w.doPrint==="function"){
                  w.doPrint();
                }else{
                  setTimeout(function(){tryPrint(attempts-1);},300);
                }
              }catch(e){setTimeout(function(){tryPrint(attempts-1);},300);}
            };
            setTimeout(function(){tryPrint(10);},800);
          }
        };
        if(window.db){
          showToast("저장된 버전 확인 중...");
          window.db.collection("brochures").doc(key).get().then(function(doc){
            window._brochureLastSeen=window._brochureLastSeen||{};
            if(doc.exists&&doc.data().pageHtml){
              window._brochureLastSeen[key]=doc.data().updatedAtLocal||null;
              var saved=doc.data().pageHtml;
              var merged=origHtml.replace(/<div class='page'>[\s\S]*?<\/div><\/div><script>/,saved.replace(/<\/div>\s*$/,"")+"</div><script>");
              var pageRe=/<div class=['"]page['"][^>]*>[\s\S]*?<\/div>(?=<\/div><script>)/;
              if(pageRe.test(origHtml)){
                merged=origHtml.replace(pageRe,saved);
              }
              openWin(merged);
              showToast("✅ 저장된 버전을 불러왔습니다");
            }else{
              window._brochureLastSeen[key]=null;
              openWin(origHtml);
            }
          }).catch(function(e){
            console.warn("브로셔 로드 실패:",e);
            openWin(origHtml);
          });
        }else{
          openWin(origHtml);
        }
      }catch(e){showToast("오류: "+e.message);}
    };
    /* 사이드바에서 직접 열기 신호 받으면 인라인 표시 (팝업X) */
    /* (autoOpenPL이 설정되어 있으면 아래 화면 분기에서 iframe으로 표시) */
    /* 메시지 수신: 새 창에서 저장 요청 */
    if(!window._plMsgBound){
      window._plMsgBound=true;
      window.addEventListener("message",function(e){
        if(!e.data||e.data.type!=="pl_save")return;
        var key=e.data.key;
        var pageHtml=e.data.html;
        if(!key||!pageHtml)return;
        if(!window.db){
          if(e.source)try{e.source.postMessage({type:"pl_save_result",success:false,error:"Firebase 연결 없음 (오프라인)"},"*");}catch(_){}
          return;
        }
        /* 낙관적 락: 로드 시 캡처한 updatedAtLocal과 서버 현재값 비교 → 충돌 차단 */
        var lastSeen=(window._brochureLastSeen&&window._brochureLastSeen[key])||null;
        var ref=window.db.collection("brochures").doc(key);
        var newUpdatedAtLocal=new Date().toISOString();
        var done=false;
        var timer=setTimeout(function(){if(!done&&e.source)try{e.source.postMessage({type:"pl_save_result",success:false,error:"⏳ Firestore 보안규칙 또는 네트워크 문제"},"*");}catch(_){}},5000);
        window.db.runTransaction(function(tx){
          return tx.get(ref).then(function(snap){
            var serverUpdatedLocal=snap.exists?(snap.data().updatedAtLocal||null):null;
            if(serverUpdatedLocal && serverUpdatedLocal!==lastSeen){
              var err2=new Error("CONFLICT");err2.serverUpdatedAt=serverUpdatedLocal;throw err2;
            }
            tx.set(ref,{key:key,pageHtml:pageHtml,updatedAt:firebase.firestore.FieldValue.serverTimestamp(),updatedAtLocal:newUpdatedAtLocal},{merge:true});
            return newUpdatedAtLocal;
          });
        }).then(function(savedAt){
          done=true;clearTimeout(timer);
          window._brochureLastSeen=window._brochureLastSeen||{};
          window._brochureLastSeen[key]=savedAt;
          if(e.source)try{e.source.postMessage({type:"pl_save_result",success:true},"*");}catch(_){}
          showToast("✅ 가격표 저장 완료: "+key);
        }).catch(function(err){
          done=true;clearTimeout(timer);
          if(err.message==="CONFLICT"){
            console.warn("[brochures] 동시 편집 충돌:",err.serverUpdatedAt);
            if(e.source)try{e.source.postMessage({type:"pl_save_result",success:false,error:"⚠️ 다른 사용자가 먼저 저장했습니다.\n새로고침 후 다시 시도해주세요."},"*");}catch(_){}
            showToast("⚠️ 충돌: 다른 사용자가 먼저 저장했습니다");
          }else{
            console.error("[brochures save]",err);
            if(e.source)try{e.source.postMessage({type:"pl_save_result",success:false,error:err.message},"*");}catch(_){}
          }
        });
      });
    }
    /* 저장된 버전 초기화 */
    var resetSaved=function(m){
      var key,label;
      if(m==="cargo"){key="pl_cargo";label="PV5 카고";}
      else if(m==="passenger"){key="pl_passenger";label="PV5 패신저";}
      else{
        /* m = "vehicleId__modelId" */
        var parts=m.split("__");
        var vv=D.vehicles.find(function(x){return x.id===parts[0];});
        var mm=vv?vv.models.find(function(x){return x.id===parts[1];}):null;
        if(!mm){showToast("모델 정보 없음");return;}
        key="pl_"+m.replace(/[^a-zA-Z0-9_]/g,"_");
        label=mm.name.replace(/\\n/g," ");
      }
      if(!confirm("⚠️ "+label+" 가격표의 저장된 수정사항을 모두 삭제하고 원본으로 되돌릴까요?"))return;
      if(!window.db){showToast("Firebase 연결 없음");return;}
      window.db.collection("brochures").doc(key).delete().then(function(){
        if(window._brochureLastSeen)delete window._brochureLastSeen[key];
        showToast("✅ "+label+" 원본으로 복원됨");
      }).catch(function(err){
        console.error("[brochures reset]",err);
        showToast("❌ 초기화 실패: "+err.message);
      });
    };
    var cS={width:280,background:"#fff",border:"2px solid #1b2f4e",borderRadius:16,padding:"32px 24px",cursor:"pointer",textAlign:"center",boxShadow:"0 2px 12px rgba(27,47,78,0.08)",transition:"all 0.2s"};
    var bS={background:"#1b2f4e",color:"#fff",padding:"10px 0",borderRadius:8,fontSize:14,fontWeight:800,marginTop:16};
    var oe=function(e){e.currentTarget.style.transform="translateY(-3px)";e.currentTarget.style.boxShadow="0 8px 24px rgba(27,47,78,0.18)";};
    var ol=function(e){e.currentTarget.style.transform="none";e.currentTarget.style.boxShadow="0 2px 12px rgba(27,47,78,0.08)";};
    /* autoOpenPL이 설정되어 있으면: 카드 그리드 대신 iframe으로 가격표 인라인 표시 */
    if(autoOpenPL){
      const _target=autoOpenPL;
      let _origHtml,_label;
      if(_target==="cargo"){_origHtml=window.PL_CARGO;_label="PV5 카고";}
      else if(_target==="passenger"){_origHtml=window.PL_PASS;_label="PV5 패신저";}
      else{
        const opts=buildPLOpts(_target);
        if(opts){_origHtml=window.generatePL(opts);_label=opts.title.replace("FCP 리무진 ","").replace(" 특장 가격표","");}
      }
      const _key=_target==="cargo"?"pl_cargo":_target==="passenger"?"pl_passenger":"pl_"+_target.replace(/[^a-zA-Z0-9_]/g,"_");
      return(<div style={{minHeight:"100vh",background:"#f0f4f8",fontFamily:F,display:"flex",flexDirection:"column"}}>{toastEl}<FL />
        <SideNav />
        <div className="ent-content-wrap" style={{marginLeft:240,display:"flex",flexDirection:"column",height:"100vh"}}>
          <div style={{padding:"10px 20px",background:"#1b2f4e",color:"#fff",display:"flex",alignItems:"center",justifyContent:"space-between",gap:10,flexWrap:"wrap"}}>
            <div style={{display:"flex",alignItems:"center",gap:10}}>
              <span style={{fontSize:11,letterSpacing:2,color:"#93C5FD",fontWeight:700}}>PRICE LIST</span>
              <span style={{fontSize:15,fontWeight:800}}>{_label}</span>
            </div>
            <div style={{display:"flex",gap:6}}>
              <button onClick={()=>{const f=document.getElementById("plFrame");if(f&&f.contentWindow&&f.contentWindow.doPrint)f.contentWindow.doPrint();}} style={{background:"#fff",color:"#1b2f4e",border:"none",padding:"7px 14px",borderRadius:5,fontSize:12,fontWeight:800,cursor:"pointer"}}>🖨️ 인쇄</button>
              <button onClick={()=>openPL(_target)} style={{background:"transparent",color:"#fff",border:"1px solid rgba(255,255,255,0.5)",padding:"7px 14px",borderRadius:5,fontSize:12,fontWeight:700,cursor:"pointer"}}>↗ 새 창에서 열기</button>
              <button onClick={()=>setAutoOpenPL(null)} style={{background:"transparent",color:"#fff",border:"1px solid rgba(255,255,255,0.5)",padding:"7px 14px",borderRadius:5,fontSize:12,fontWeight:700,cursor:"pointer"}}>← 카드 목록</button>
            </div>
          </div>
          <iframe id="plFrame" srcDoc={_origHtml} style={{flex:1,width:"100%",border:"none",background:"#e8ecf0"}} title={_label}
            onLoad={e=>{
              try{
                const w=e.target.contentWindow;
                if(w)w.PL_KEY=_key;
                /* Firebase 저장본 자동 로드 */
                if(window.db){
                  window.db.collection("brochures").doc(_key).get().then(doc=>{
                    window._brochureLastSeen=window._brochureLastSeen||{};
                    window._brochureLastSeen[_key]=doc.exists?(doc.data().updatedAtLocal||null):null;
                    if(doc.exists&&doc.data().pageHtml&&w&&!w.closed){
                      const saved=doc.data().pageHtml;
                      const cur=w.document.querySelector(".page");
                      if(cur)cur.outerHTML=saved;
                      try{w.doScale&&w.doScale();w.doBorders&&w.doBorders();}catch(_){}
                    }
                  }).catch(e=>{console.warn("[brochures iframe load]",e);});
                }
              }catch(_){}
            }}></iframe>
        </div>
      </div>);
    }
    return(<div style={{minHeight:"100vh",background:"#f0f4f8",fontFamily:F}}>{toastEl}<FL />
      <SideNav />
      <div className="ent-content-wrap" style={{marginLeft:240,padding:"40px 20px"}}>
      <div style={{maxWidth:700,margin:"0 auto"}}>
        <div style={{marginBottom:24,display:"flex",gap:8}}><button onClick={()=>{setMainMenu(null);setUsedSub(null);setStep(0);}} style={{...bL,fontSize:13}}>🏠 포털 홈</button></div>
        <div style={{textAlign:"center",marginBottom:32}}>
          <div style={{fontSize:12,letterSpacing:6,color:"#999",fontWeight:600,marginBottom:6}}>PRICE LIST</div>
          <div style={{fontSize:26,fontWeight:900,color:"#1b2f4e"}}>가격표 출력 / 편집</div>
          <div style={{fontSize:13,color:"#99aaaa",marginTop:6}}>모델 선택 → 새 창에서 편집·행추가·인쇄</div>
        </div>
        <div style={{display:"flex",gap:20,justifyContent:"center",flexWrap:"wrap"}}>
          <div style={cS} onMouseEnter={oe} onMouseLeave={ol}>
            <div onClick={()=>openPL("cargo")} style={{cursor:"pointer"}}>
              <div style={{fontSize:36,marginBottom:12}}>📦</div>
              <div style={{fontSize:20,fontWeight:900,color:"#1b2f4e",marginBottom:6}}>PV5 카고</div>
              <div style={{fontSize:13,color:"#778899",lineHeight:1.7}}>카고 베이직 스탠다드<br/>카고 롱레인지</div>
            </div>
            <div style={{display:"flex",gap:6,marginTop:12}}>
              <button onClick={()=>openPL("cargo")} style={{flex:1,background:"#1b2f4e",color:"#fff",border:"none",padding:"9px 10px",borderRadius:6,fontSize:12,fontWeight:800,cursor:"pointer"}}>✏️ 편집</button>
              <button onClick={()=>openPL("cargo",true)} style={{flex:1,background:"#fff",color:"#1b2f4e",border:"1.5px solid #1b2f4e",padding:"9px 10px",borderRadius:6,fontSize:12,fontWeight:800,cursor:"pointer"}}>🖨️ 인쇄</button>
            </div>
            <button onClick={()=>resetSaved("cargo")} style={{marginTop:8,width:"100%",background:"transparent",color:"#dc2626",border:"1px solid #fecaca",padding:"6px 10px",borderRadius:6,fontSize:11,fontWeight:600,cursor:"pointer"}}>↺ 원본으로 초기화</button>
          </div>
          <div style={cS} onMouseEnter={oe} onMouseLeave={ol}>
            <div onClick={()=>openPL("passenger")} style={{cursor:"pointer"}}>
              <div style={{fontSize:36,marginBottom:12}}>🚌</div>
              <div style={{fontSize:20,fontWeight:900,color:"#1b2f4e",marginBottom:6}}>PV5 패신저</div>
              <div style={{fontSize:13,color:"#778899",lineHeight:1.7}}>패신저 베이직<br/>패신저 플러스</div>
            </div>
            <div style={{display:"flex",gap:6,marginTop:12}}>
              <button onClick={()=>openPL("passenger")} style={{flex:1,background:"#1b2f4e",color:"#fff",border:"none",padding:"9px 10px",borderRadius:6,fontSize:12,fontWeight:800,cursor:"pointer"}}>✏️ 편집</button>
              <button onClick={()=>openPL("passenger",true)} style={{flex:1,background:"#fff",color:"#1b2f4e",border:"1.5px solid #1b2f4e",padding:"9px 10px",borderRadius:6,fontSize:12,fontWeight:800,cursor:"pointer"}}>🖨️ 인쇄</button>
            </div>
            <button onClick={()=>resetSaved("passenger")} style={{marginTop:8,width:"100%",background:"transparent",color:"#dc2626",border:"1px solid #fecaca",padding:"6px 10px",borderRadius:6,fontSize:11,fontWeight:600,cursor:"pointer"}}>↺ 원본으로 초기화</button>
          </div>
          {/* 모델 기반 자동 렌더링 (카니발 FCP/FC9/.../챌린저 등) - PV5 모델은 카고/패신저로 별도 처리됨 */}
          {(()=>{
            const cards=[];
            D.vehicles.forEach(v=>{
              if(v.id==="pv5")return; /* PV5 모델은 위의 카고/패신저 카드로 통합 */
              v.models.forEach(m=>{
                cards.push({v:v,m:m,key:v.id+"__"+m.id});
              });
            });
            return cards.map(c=>{
              const emoji=c.v.id==="carnival"?"🚐":c.v.id==="challenger"?"🏕️":c.v.id==="ch_santafe"?"⛰️":"🚗";
              const trimList=c.v.trims.slice(0,3).map(t=>t.name).join(" · ")+(c.v.trims.length>3?" 외":"");
              const modelName=c.m.name.replace(/\n/g," ");
              return(<div key={c.key} style={cS} onMouseEnter={oe} onMouseLeave={ol}>
                <div onClick={()=>openPL(c.key)} style={{cursor:"pointer"}}>
                  <div style={{fontSize:36,marginBottom:12}}>{emoji}</div>
                  <div style={{fontSize:11,color:"#7C8DA0",fontWeight:700,letterSpacing:1.5,marginBottom:4}}>{c.v.badge}</div>
                  <div style={{fontSize:18,fontWeight:900,color:"#1b2f4e",marginBottom:6,lineHeight:1.2}}>{modelName}</div>
                  <div style={{fontSize:12,color:"#778899",lineHeight:1.5}}>{c.m.subtitle}</div>
                  <div style={{fontSize:11,color:"#aabbcc",marginTop:4}}>트림: {trimList}</div>
                </div>
                <div style={{display:"flex",gap:6,marginTop:12}}>
                  <button onClick={()=>openPL(c.key)} style={{flex:1,background:"#1b2f4e",color:"#fff",border:"none",padding:"9px 10px",borderRadius:6,fontSize:12,fontWeight:800,cursor:"pointer"}}>✏️ 편집</button>
                  <button onClick={()=>openPL(c.key,true)} style={{flex:1,background:"#fff",color:"#1b2f4e",border:"1.5px solid #1b2f4e",padding:"9px 10px",borderRadius:6,fontSize:12,fontWeight:800,cursor:"pointer"}}>🖨️ 인쇄</button>
                </div>
                <button onClick={()=>resetSaved(c.key)} style={{marginTop:8,width:"100%",background:"transparent",color:"#dc2626",border:"1px solid #fecaca",padding:"6px 10px",borderRadius:6,fontSize:11,fontWeight:600,cursor:"pointer"}}>↺ 원본으로 초기화</button>
              </div>);
            });
          })()}
        </div>
        <div style={{marginTop:24,padding:"14px 18px",background:"#e8f4ff",borderRadius:8,border:"1px solid #bae6fd",fontSize:12,color:"#0369A1",lineHeight:1.8}}>
          💡 카드 클릭 → 새 창 → 텍스트 수정 / <strong>＋ 행 추가</strong> / <strong>↩ 되돌리기</strong> → <strong style={{color:"#059669"}}>💾 내용 저장</strong> (Firebase) → 🖨️ 인쇄<br/>
          <span style={{fontSize:11,color:"#64748B"}}>※ 저장된 수정사항은 다음 열기 시 자동으로 불러와집니다 · 원본으로 되돌리려면 "원본으로 초기화" 버튼 사용</span>
        </div>
      </div>
      </div>
    </div>);
  }

  return null;
}

function MC({m,onClick}){const[h,setH]=useState(false);return(<div onClick={onClick} onMouseEnter={()=>setH(true)} onMouseLeave={()=>setH(false)} style={{width:170,background:"#fff",border:`1px solid ${h?"#ccc":"#eee"}`,borderRadius:12,padding:"22px 18px",cursor:"pointer",transition:"all 0.2s",transform:h?"translateY(-2px)":"none",boxShadow:h?"0 8px 20px rgba(0,0,0,0.06)":"0 1px 3px rgba(0,0,0,0.02)",position:"relative",overflow:"hidden"}}><div style={{position:"absolute",top:0,left:0,right:0,height:3,background:`linear-gradient(90deg,${m.color},${m.color}88)`}} /><div style={{fontSize:10,color:GD,letterSpacing:3,marginBottom:6,fontWeight:700}}>{m.subtitle}</div><div style={{fontSize:18,fontWeight:900,color:"#1a1a1a",marginBottom:4,whiteSpace:"pre-line",lineHeight:1.3}}>{m.name}</div><div style={{fontSize:12,color:"#bbb",marginBottom:14}}>옵션 {m.options.length}종</div><div style={{color:GD,fontSize:12,fontWeight:700}}>견적 시작 →</div></div>);}
function GL({t,c}){const bg=c===BL?"linear-gradient(90deg,#EBF2FF,#E0EDFF)":"linear-gradient(90deg,#FFF5E6,#FFEDCC)";return(<div style={{display:"flex",alignItems:"center",gap:8,padding:"10px 14px",borderRadius:8,background:bg,marginTop:4}}><div style={{width:5,height:18,borderRadius:3,background:c}} /><div style={{fontSize:16,fontWeight:900,color:c===BL?"#1E40AF":"#92400E"}}>{t}</div></div>);}
function Sc({t,ic,ac,bg,children}){return(<div style={{background:bg||"#fff",border:"1px solid "+(bg?"transparent":"#eee"),borderRadius:10,padding:"14px 16px"}}><div style={{display:"flex",alignItems:"center",gap:6,marginBottom:10}}>{ac&&<div style={{width:3,height:12,borderRadius:2,background:ac}} />}{ic&&<span style={{fontSize:14}}>{ic}</span>}<div style={{fontSize:13.5,fontWeight:800,color:ac||GD}}>{t}</div></div>{children}</div>);}
function In({l,v,s,ph,mt}){return(<div style={{marginTop:mt||0}}><div style={{fontSize:11,color:"#bbb",marginBottom:3,fontWeight:600}}>{l}</div><input type="text" value={v} onChange={e=>s(e.target.value)} placeholder={ph} style={{width:"100%",...iS}} /></div>);}
function TC({t,sel,oc}){return(<div onClick={oc} style={{padding:"10px 12px",borderRadius:7,cursor:"pointer",border:sel?"2px solid #1a1a1a":"1px solid #ddd",background:sel?"#fafafa":"#fff"}}><div style={{fontSize:13.5,fontWeight:700,color:sel?"#1a1a1a":"#555"}}>{t.name}</div><div style={{fontSize:15,fontWeight:800,color:sel?"#1a1a1a":"#888",marginTop:2}}>{fmt(t.price)}원</div></div>);}
function OR({it,ck,tg,lk,sd}){const neg=it.price<0;return(<div onClick={lk?undefined:tg} style={{display:"flex",alignItems:"center",gap:8,padding:"7px 8px",borderRadius:6,cursor:lk?"default":"pointer",background:ck?(neg?"#FEF2F2":"#fafafa"):"transparent",marginBottom:2}}><div style={{width:15,height:15,borderRadius:3,flexShrink:0,border:ck?(neg?"2px solid #ef4444":"2px solid #1a1a1a"):"2px solid #aaa",background:ck?(neg?"#ef4444":"#1a1a1a"):"transparent",display:"flex",alignItems:"center",justifyContent:"center",fontSize:11,color:"#fff",fontWeight:900}}>{ck&&"✓"}</div><div style={{flex:1,minWidth:0}}><div style={{fontSize:13,fontWeight:600,color:ck?(neg?"#ef4444":"#1a1a1a"):"#555"}}>{it.name}</div>{sd&&it.desc&&<div style={{fontSize:11.5,color:"#888",marginTop:1,lineHeight:1.3}}>{it.desc}</div>}</div><div style={{textAlign:"right",flexShrink:0}}>{it.originalPrice>0&&<div style={{fontSize:11,color:"#999",textDecoration:"line-through"}}>{fmt(it.originalPrice)}</div>}<div style={{fontSize:13.5,fontWeight:700,color:neg?(ck?"#ef4444":"#e88"):(ck?"#1a1a1a":"#888")}}>{fmt(it.price)}원</div></div></div>);}
function SL({l,v,d}){return(<div style={{display:"flex",justifyContent:"space-between",padding:"4px 0",fontSize:16}}><span style={{color:"#666"}}>{l}</span><span style={{color:d?"#ef4444":"#333",fontWeight:600}}>{d&&"-"}{fmt(Math.abs(v))}원</span></div>);}
function PH({t,c,mt}){return(<div style={{display:"flex",alignItems:"center",gap:6,padding:"6px 0 4px",marginTop:mt||0}}><div style={{width:4,height:12,borderRadius:2,background:c}} /><div style={{fontSize:15,fontWeight:900,color:"#333"}}>{t}</div><div style={{flex:1,height:1,background:"#eee"}} /></div>);}
function IB({l,a,b,c}){return(<div style={{background:"#FEF2F2",borderRadius:6,padding:"10px 14px",border:"2px solid #DC2626",boxShadow:"0 1px 4px rgba(220,38,38,0.08)"}}><div style={{fontSize:11,color:"#DC2626",letterSpacing:2,marginBottom:5,fontWeight:800}}>{l}</div><div style={{fontSize:16,fontWeight:800,color:"#1a1a1a"}}>{a}</div><div style={{fontSize:14,color:"#1a1a1a",fontWeight:600,marginTop:2}}>{b}</div>{c&&<div style={{fontSize:13,color:"#444",fontWeight:500,marginTop:2}}>{c}</div>}</div>);}
function Th({children,w,a="center"}){return<th style={{padding:"6px 10px",textAlign:a,fontSize:15.5,fontWeight:700,color:"#777",width:w}}>{children}</th>;}
function Td({children,a="left",b,c,s,m}){return<td style={{padding:"6px 10px",textAlign:a,fontSize:s?s+2:12.5,fontWeight:b?700:400,color:c||"#333",fontVariantNumeric:m?"tabular-nums":undefined}}>{children}</td>;}
function EP({id,price,origPrice,qty,override,setOverride}){
  const[editing,setEditing]=useState(false);
  const[val,setVal]=useState("");
  const isOverridden=id&&override[id]!==undefined;
  const displayPrice=price||0;
  if(!id) return <span>{fmt(displayPrice)}원</span>;
  const q=qty||1;
  const unitPrice=displayPrice/q;  /* 표시된 price는 단가×수량 */
  if(editing){
    return <input type="text" autoFocus value={val}
      onChange={e=>setVal(e.target.value.replace(/[^0-9-]/g,""))}
      onBlur={()=>{
        const n=Number(val);
        if(val===""||isNaN(n)){setEditing(false);return;}
        const unitNew=Math.round(n/q);  /* 수량 있으면 입력값을 단가로 환산 */
        setOverride(p=>{const np={...p};np[id]=unitNew;return np;});
        setEditing(false);
      }}
      onKeyDown={e=>{if(e.key==="Enter")e.target.blur();if(e.key==="Escape"){setEditing(false);}}}
      style={{width:100,padding:"0 4px",margin:0,border:"1.5px solid #2563EB",borderRadius:3,fontSize:"inherit",fontWeight:"inherit",fontFamily:"inherit",textAlign:"right",outline:"none",background:"#fff",verticalAlign:"baseline",boxSizing:"border-box",lineHeight:"inherit"}} />;
  }
  return <span onClick={()=>{setVal(String(displayPrice));setEditing(true);}}
    onDoubleClick={()=>{setOverride(p=>{const np={...p};delete np[id];return np;});}}
    title="클릭: 수정 / 더블클릭: 원래 가격 복원"
    style={{cursor:"pointer",color:isOverridden?"#dc2626":"inherit"}}>
    {fmt(displayPrice)}원{isOverridden&&<span style={{fontSize:9,color:"#dc2626",marginLeft:3,fontWeight:900}}>✎</span>}
  </span>;
}
const bL={background:"#fff",border:"1px solid #eee",color:"#888",padding:"7px 12px",borderRadius:6,cursor:"pointer",fontSize:13,fontWeight:600};
const iS={background:"#fafafa",border:"1px solid #eee",borderRadius:5,color:"#222",padding:"6px 9px",fontSize:13,outline:"none"};
const dB={background:"none",border:"1px solid #fcc",color:"#c00",borderRadius:3,padding:"1px 5px",fontSize:11,cursor:"pointer"};
const aB={background:"#fafafa",border:"1px solid #eee",borderRadius:5,padding:"5px 12px",fontSize:12,fontWeight:700,color:"#999",cursor:"pointer",marginTop:6};
const thC={padding:"4px 8px",background:"#f7f7f7",fontWeight:600,color:"#888",borderRight:"1px solid #ccc",borderBottom:"1px solid #eee",width:"13%"};
const tdC={padding:"4px 8px",borderBottom:"1px solid #eee",color:"#222",fontWeight:600};

const root = ReactDOM.createRoot(document.getElementById('root'));
root.render(React.createElement(App));
</script>
<script>
/* BFCache 복원 시 강제 새로고침 → React 상태 항상 초기화 */
window.addEventListener('pageshow',function(e){if(e.persisted){window.location.reload();}});

(function(){
  if(!('serviceWorker' in navigator)) return;
  var h=location.hostname;
  var isLocal=(h==='localhost'||h==='127.0.0.1'||h==='0.0.0.0'||h===''||h.endsWith('.local'));
  if(isLocal){
    /* 개발: 등록된 SW 모두 해제 + 캐시 비움 → 새로고침마다 항상 최신 파일 */
    navigator.serviceWorker.getRegistrations().then(function(rs){
      rs.forEach(function(r){r.unregister();});
    }).catch(function(){});
    if(window.caches){
      caches.keys().then(function(ks){ks.forEach(function(k){caches.delete(k);});}).catch(function(){});
    }
    return;
  }
  /* 운영: SW 등록 + 새 버전 감지 시 자동 새로고침 (이전 페이지 잔재 방지) */
  navigator.serviceWorker.register('./sw.js').then(function(reg){
    reg.addEventListener('updatefound',function(){
      var nw=reg.installing;
      if(!nw) return;
      nw.addEventListener('statechange',function(){
        if(nw.state==='installed' && navigator.serviceWorker.controller){
          nw.postMessage({type:'SKIP_WAITING'});
        }
      });
    });
  }).catch(function(e){console.warn('[SW] register fail:',e);});
  var refreshing=false;
  navigator.serviceWorker.addEventListener('controllerchange',function(){
    if(refreshing) return;
    refreshing=true;
    window.location.reload();
  });
})();
</script>
